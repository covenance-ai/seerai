<svg width="100%" viewBox="-20 0 790 780" role="img" xmlns="http://www.w3.org/2000/svg" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif">
<title>SeerAI B2B data architecture during service</title>
<desc>Developer coding sessions are encrypted per-developer and flow into SeerAI. Inside SeerAI, a privacy firewall separates two zones: the personal-data zone above (individual encrypted sessions, visible only to each developer), and the aggregate-data zone below (team-level statistics and non-personal patterns). Only the aggregate-data zone connects to the employer.</desc>

<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- ============ DEVELOPERS (data subjects) ============ -->
<text x="40" y="36" font-size="14" font-weight="500" fill="#141413">Developers (data subjects)</text>

<g>
  <rect x="40" y="50" width="130" height="52" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="105" y="70" text-anchor="middle" font-size="14" font-weight="500" fill="#0C447C">Dev A</text>
  <text x="105" y="86" text-anchor="middle" font-size="12" fill="#185FA5">AI coding session</text>
</g>
<g>
  <rect x="200" y="50" width="130" height="52" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="265" y="70" text-anchor="middle" font-size="14" font-weight="500" fill="#0C447C">Dev B</text>
  <text x="265" y="86" text-anchor="middle" font-size="12" fill="#185FA5">AI coding session</text>
</g>
<g>
  <rect x="360" y="50" width="130" height="52" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="425" y="70" text-anchor="middle" font-size="14" font-weight="500" fill="#0C447C">Dev C</text>
  <text x="425" y="86" text-anchor="middle" font-size="12" fill="#185FA5">AI coding session</text>
</g>
<g>
  <rect x="520" y="50" width="130" height="52" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="585" y="80" text-anchor="middle" font-size="12" fill="#5F5E5A">Dev D, E, F ...</text>
</g>

<!-- Developer person icons -->
<g opacity="0.55">
  <g transform="translate(75, 68)"><circle r="3.5" cy="-3" fill="#185FA5"/><path d="M-5,5 C-5,0.5 5,0.5 5,5" fill="#185FA5"/></g>
  <g transform="translate(235, 68)"><circle r="3.5" cy="-3" fill="#185FA5"/><path d="M-5,5 C-5,0.5 5,0.5 5,5" fill="#185FA5"/></g>
  <g transform="translate(395, 68)"><circle r="3.5" cy="-3" fill="#185FA5"/><path d="M-5,5 C-5,0.5 5,0.5 5,5" fill="#185FA5"/></g>
</g>

<!-- Arrows down from devs -->
<line x1="105" y1="102" x2="105" y2="148" marker-end="url(#arrow)" stroke="#73726C" stroke-width="1.5" fill="none"/>
<line x1="265" y1="102" x2="265" y2="148" marker-end="url(#arrow)" stroke="#73726C" stroke-width="1.5" fill="none"/>
<line x1="425" y1="102" x2="425" y2="148" marker-end="url(#arrow)" stroke="#73726C" stroke-width="1.5" fill="none"/>
<line x1="585" y1="102" x2="585" y2="148" marker-end="url(#arrow)" stroke="#73726C" stroke-width="1.5" fill="none"/>

<!-- ============ CLIENT-SIDE ENCRYPTION BAND ============ -->
<g>
  <rect x="40" y="148" width="610" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="345" y="174" text-anchor="middle" font-size="14" font-weight="500" fill="#085041">Client-side encryption (per-developer keys, employer cannot access)</text>
</g>

<!-- Arrow down into SeerAI -->
<line x1="345" y1="192" x2="345" y2="228" marker-end="url(#arrow)" stroke="#73726C" stroke-width="1.5" fill="none"/>

<!-- ============ SEERAI PLATFORM ============ -->
<rect x="40" y="228" width="610" height="372" rx="20" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="345" y="248" text-anchor="middle" font-size="14" font-weight="500" fill="#3C3489">SeerAI (processor under Art. 28 DPA)</text>

<!-- === PERSONAL DATA ZONE === -->
<rect x="56" y="270" width="578" height="134" rx="12" fill="#FDF1F1" stroke="#B94A4A" stroke-width="0.8"/>
<rect x="165" y="262" width="360" height="20" rx="10" fill="#FBDBDB" stroke="#B94A4A" stroke-width="0.6"/>
<text x="345" y="276" text-anchor="middle" font-size="10.5" font-weight="700" fill="#8E2D2D" letter-spacing="0.5">PERSONAL DATA · INDIVIDUAL SESSIONS</text>

<!-- Encrypted session storage -->
<g>
  <rect x="72" y="306" width="246" height="64" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="195" y="327" text-anchor="middle" font-size="13" font-weight="500" fill="#0C447C">Encrypted session storage</text>
  <text x="195" y="345" text-anchor="middle" font-size="11" fill="#185FA5">per-dev key in KMS</text>
  <text x="195" y="360" text-anchor="middle" font-size="11" fill="#185FA5">raw prompts &amp; completions</text>
</g>

<!-- Anonymizing extraction -->
<g>
  <rect x="372" y="306" width="246" height="64" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="495" y="327" text-anchor="middle" font-size="13" font-weight="500" fill="#085041">Anonymizing extraction</text>
  <text x="495" y="345" text-anchor="middle" font-size="11" fill="#0F6E56">strips identifiers, bins values</text>
  <text x="495" y="360" text-anchor="middle" font-size="11" fill="#0F6E56">outputs non-personal only</text>
</g>

<!-- Arrow Encrypted → Anonymizing -->
<line x1="322" y1="338" x2="368" y2="338" marker-end="url(#arrow)" stroke="#73726C" stroke-width="1.5" fill="none"/>

<!-- === PRIVACY FIREWALL === -->
<line x1="56" y1="420" x2="634" y2="420" stroke="#E24B4A" stroke-width="5" stroke-linecap="round" opacity="0.85"/>
<text x="345" y="438" text-anchor="middle" font-size="12" font-weight="600" fill="#A93A3A" letter-spacing="0.3">Privacy firewall — no personal data crosses below</text>

<!-- === AGGREGATE DATA ZONE === -->
<rect x="56" y="460" width="578" height="134" rx="12" fill="#EFF8F0" stroke="#3B6D11" stroke-width="0.8"/>
<rect x="165" y="452" width="360" height="20" rx="10" fill="#D5E8C4" stroke="#3B6D11" stroke-width="0.6"/>
<text x="345" y="466" text-anchor="middle" font-size="10.5" font-weight="700" fill="#27500A" letter-spacing="0.5">AGGREGATE DATA · NO RE-IDENTIFICATION</text>

<!-- Team/org aggregates -->
<g>
  <rect x="72" y="496" width="246" height="64" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text x="195" y="517" text-anchor="middle" font-size="13" font-weight="500" fill="#633806">Team &amp; org aggregates</text>
  <text x="195" y="535" text-anchor="middle" font-size="11" fill="#854F0B">counts, rates, trends</text>
  <text x="195" y="550" text-anchor="middle" font-size="11" fill="#854F0B">min cohort 10 (k-anonymity)</text>
</g>

<!-- Code knowledge base -->
<g>
  <rect x="372" y="496" width="246" height="64" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
  <text x="495" y="517" text-anchor="middle" font-size="13" font-weight="500" fill="#27500A">Code knowledge base</text>
  <text x="495" y="535" text-anchor="middle" font-size="11" fill="#3B6D11">patterns, FAQs, decisions</text>
  <text x="495" y="550" text-anchor="middle" font-size="11" fill="#3B6D11">no author, no session link</text>
</g>

<!-- Arrows crossing the firewall (personal zone → aggregate zone, as anonymized outputs) -->
<line x1="195" y1="374" x2="195" y2="494" marker-end="url(#arrow)" stroke="#73726C" stroke-width="1.3" fill="none"/>
<line x1="495" y1="374" x2="495" y2="494" marker-end="url(#arrow)" stroke="#73726C" stroke-width="1.3" fill="none"/>

<!-- ============ PERSONAL ANALYTICS LOOPBACK (dev only) ============ -->
<path d="M72 338 L48 338 L48 170" fill="none" marker-end="url(#arrow)" stroke="#73726C" stroke-width="1.5"/>
<text x="42" y="240" text-anchor="end" font-size="11" fill="#3D3D3A">
  <tspan x="42" dy="0">Personal</tspan>
  <tspan x="42" dy="14">analytics</tspan>
  <tspan x="42" dy="14">(dev only)</tspan>
</text>

<!-- ============ AGGREGATE DATA → EMPLOYER ============ -->
<line x1="345" y1="600" x2="345" y2="640" marker-end="url(#arrow)" stroke="#3B6D11" stroke-width="2" fill="none"/>
<rect x="255" y="610" width="180" height="20" rx="10" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.6"/>
<text x="345" y="624" text-anchor="middle" font-size="11" font-weight="600" fill="#27500A" letter-spacing="0.3">AGGREGATE DATA ONLY</text>

<!-- ============ EMPLOYER ============ -->
<g>
  <rect x="140" y="640" width="410" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text x="345" y="662" text-anchor="middle" font-size="14" font-weight="500" fill="#712B13">Employer (data controller)</text>
  <text x="345" y="680" text-anchor="middle" font-size="12" fill="#993C1D">sees aggregates &amp; knowledge base — never individuals</text>
  <g transform="translate(175, 664)" opacity="0.45">
    <rect x="-7" y="-14" width="14" height="22" rx="1" fill="#993C1D"/>
    <rect x="-4.5" y="-11" width="3" height="2.5" rx="0.3" fill="#FAECE7"/>
    <rect x="1.5" y="-11" width="3" height="2.5" rx="0.3" fill="#FAECE7"/>
    <rect x="-4.5" y="-6.5" width="3" height="2.5" rx="0.3" fill="#FAECE7"/>
    <rect x="1.5" y="-6.5" width="3" height="2.5" rx="0.3" fill="#FAECE7"/>
    <rect x="-4.5" y="-2" width="3" height="2.5" rx="0.3" fill="#FAECE7"/>
    <rect x="1.5" y="-2" width="3" height="2.5" rx="0.3" fill="#FAECE7"/>
    <rect x="-2" y="3" width="4" height="5" rx="0.5" fill="#FAECE7"/>
  </g>
</g>

<!-- Blocked arrow: employer → individual sessions (prohibited at firewall) -->
<path d="M550 668 L682 668 L682 432" fill="none" stroke="#E24B4A" stroke-width="1" stroke-dasharray="4 3" opacity="0.55"/>
<path d="M682 408 L682 338 L622 338" fill="none" marker-end="url(#arrow)" stroke="#E24B4A" stroke-width="1" stroke-dasharray="4 3" opacity="0.55"/>
<!-- Prohibition marker on firewall -->
<g transform="translate(682, 420)">
  <circle r="11" fill="white" stroke="#E24B4A" stroke-width="1.7"/>
  <line x1="-6" y1="-6" x2="6" y2="6" stroke="#E24B4A" stroke-width="1.7"/>
</g>
<text x="696" y="405" font-size="11" fill="#3D3D3A">
  <tspan x="696" dy="0">No access to</tspan>
  <tspan x="696" dy="13">individual</tspan>
  <tspan x="696" dy="13">sessions</tspan>
</text>

<!-- ============ DPA CONTRACT CALLOUT ============ -->
<g>
  <rect x="140" y="716" width="410" height="36" rx="6" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="345" y="738" text-anchor="middle" font-size="12" fill="#5F5E5A">DPA defines scope — employer agreed at contract signing</text>
</g>

</svg>

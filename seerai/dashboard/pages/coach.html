<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>seerai — coach</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
    <script>if (localStorage.getItem('seerai_theme') === 'dark' || (!localStorage.getItem('seerai_theme') && matchMedia('(prefers-color-scheme:dark)').matches)) document.documentElement.classList.add('dark');</script>
    <script src="/static/nav.js" defer></script>
</head>
<body class="bg-gray-50 dark:bg-gray-950 text-gray-800 dark:text-gray-200 min-h-screen">
    <div class="max-w-6xl mx-auto px-4 py-8">
        <p class="text-sm text-gray-500 dark:text-gray-400 mb-1">
            <a href="/" class="text-blue-600 dark:text-blue-400 hover:underline">seerai</a>
            <span class="mx-1">/</span>
            <span class="text-gray-700 dark:text-gray-300">coach</span>
        </p>
        <h1 class="text-2xl font-bold text-gray-900 dark:text-white mb-2 flex items-center gap-2">
            <svg class="w-6 h-6 text-emerald-600 dark:text-emerald-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3l7 3v6c0 4.5-3.1 8.4-7 9-3.9-.6-7-4.5-7-9V6l7-3z"/><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4"/></svg>
            Coach
        </h1>
        <p class="text-sm text-gray-500 dark:text-gray-400 mb-5">
            What an observer LLM caught and corrected during live AI sessions — factuality, efficiency, sources, and other quality dimensions.
            Counterfactual values are estimated from the without-coach transcript stored at the time of intervention.
        </p>

        <!-- Category filter chips -->
        <div class="flex items-center gap-2 mb-5 flex-wrap" id="filters">
            <button data-filter="" class="filter-btn px-3 py-1.5 rounded-lg text-xs font-medium border transition-colors">All</button>
            <button data-filter="factuality" class="filter-btn px-3 py-1.5 rounded-lg text-xs font-medium border transition-colors">Factuality</button>
            <button data-filter="efficiency" class="filter-btn px-3 py-1.5 rounded-lg text-xs font-medium border transition-colors">Efficiency</button>
            <button data-filter="sources" class="filter-btn px-3 py-1.5 rounded-lg text-xs font-medium border transition-colors">Sources</button>
            <button data-filter="other" class="filter-btn px-3 py-1.5 rounded-lg text-xs font-medium border transition-colors">Other</button>
        </div>

        <!-- KPI grid: Without · With · Δ for value, turns; plus interventions count and acceptance -->
        <div id="kpi-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-3 mb-6"></div>

        <!-- Per-category breakdown -->
        <div id="categories" class="mb-6"></div>

        <!-- Utility shift table -->
        <div id="utility-shift" class="mb-6"></div>

        <!-- Recent interventions feed -->
        <h2 class="text-base font-semibold text-gray-900 dark:text-white mb-2">Recent interventions</h2>
        <div id="feed"></div>
    </div>

    <script>
        const COACH_STYLES = {
            factuality: { label: 'Factuality', dot: 'bg-rose-500', text: 'text-rose-700 dark:text-rose-300', bg: 'bg-rose-50 dark:bg-rose-900/20', border: 'border-rose-300 dark:border-rose-700/50' },
            efficiency: { label: 'Efficiency', dot: 'bg-sky-500', text: 'text-sky-700 dark:text-sky-300', bg: 'bg-sky-50 dark:bg-sky-900/20', border: 'border-sky-300 dark:border-sky-700/50' },
            sources:    { label: 'Sources',    dot: 'bg-violet-500', text: 'text-violet-700 dark:text-violet-300', bg: 'bg-violet-50 dark:bg-violet-900/20', border: 'border-violet-300 dark:border-violet-700/50' },
            other:      { label: 'Other',      dot: 'bg-amber-500', text: 'text-amber-700 dark:text-amber-300', bg: 'bg-amber-50 dark:bg-amber-900/20', border: 'border-amber-300 dark:border-amber-700/50' },
        };

        let activeFilter = '';
        const orgFilter = new URLSearchParams(window.location.search).get('org_id') || '';

        function fmtMoney(cents) {
            const dollars = (cents || 0) / 100;
            const sign = dollars < 0 ? '-' : '';
            const abs = Math.abs(dollars);
            if (abs >= 1000) return sign + '$' + (abs / 1000).toFixed(1) + 'k';
            return sign + '$' + abs.toFixed(0);
        }

        function fmtNum(n) {
            n = n || 0;
            if (Math.abs(n) >= 1000) return (n / 1000).toFixed(1) + 'k';
            return Math.round(n).toLocaleString();
        }

        function deltaPill(delta, kind, baseline) {
            // kind: 'currency' | 'count'
            // baseline: optional reference value to compute % change against.
            // Skip the % when the baseline is too small to be meaningful — a
            // tiny denominator turns small deltas into nonsensical %s (a $5
            // delta vs a $0.50 baseline isn't really "+1000%").
            const positive = delta > 0;
            const cls = positive
                ? 'text-emerald-700 dark:text-emerald-300 bg-emerald-50 dark:bg-emerald-900/30'
                : delta < 0
                ? 'text-red-700 dark:text-red-300 bg-red-50 dark:bg-red-900/30'
                : 'text-gray-500 dark:text-gray-400 bg-gray-100 dark:bg-gray-800';
            const arrow = positive ? '↑' : delta < 0 ? '↓' : '·';
            const value = kind === 'currency' ? fmtMoney(delta) : fmtNum(delta);
            let pctSuffix = '';
            if (baseline !== undefined && baseline !== null && Math.abs(baseline) > 1e-6) {
                const pct = (delta / Math.abs(baseline)) * 100;
                if (Math.abs(pct) >= 1 && Math.abs(pct) < 1000) {
                    pctSuffix = ` <span class="opacity-75">(${pct > 0 ? '+' : ''}${pct.toFixed(0)}%)</span>`;
                }
            }
            return `<span class="inline-flex items-center gap-0.5 px-1.5 py-0.5 rounded text-[0.65rem] font-semibold ${cls}">${arrow} ${value}${pctSuffix}</span>`;
        }

        function comparedKpi(title, compared, kind) {
            const fmt = kind === 'currency' ? fmtMoney : fmtNum;
            // Use abs(without) as the baseline so the % reads as "uplift over
            // baseline magnitude" — when without_coach is negative (harmful
            // counterfactual), a positive delta is still a positive %.
            return `<div class="rounded-xl border border-gray-200 dark:border-gray-800 bg-white dark:bg-gray-900 p-4">
                <div class="text-[0.7rem] uppercase tracking-wider text-gray-500 dark:text-gray-400 mb-2">${esc(title)}</div>
                <div class="grid grid-cols-3 gap-2 items-end">
                    <div>
                        <div class="text-[0.65rem] text-gray-400 mb-0.5">Without</div>
                        <div class="text-base font-medium text-gray-500 dark:text-gray-400 line-through opacity-80">${fmt(compared.without_coach)}</div>
                    </div>
                    <div>
                        <div class="text-[0.65rem] text-gray-400 mb-0.5">With</div>
                        <div class="text-xl font-bold text-gray-900 dark:text-white">${fmt(compared.with_coach)}</div>
                    </div>
                    <div class="text-right">
                        <div class="text-[0.65rem] text-gray-400 mb-0.5">Δ</div>
                        ${deltaPill(compared.delta, kind, compared.without_coach)}
                    </div>
                </div>
            </div>`;
        }

        function plainKpi(title, value, sub) {
            return `<div class="rounded-xl border border-gray-200 dark:border-gray-800 bg-white dark:bg-gray-900 p-4">
                <div class="text-[0.7rem] uppercase tracking-wider text-gray-500 dark:text-gray-400 mb-2">${esc(title)}</div>
                <div class="text-2xl font-bold text-gray-900 dark:text-white">${value}</div>
                ${sub ? `<div class="text-xs text-gray-500 dark:text-gray-400 mt-1">${sub}</div>` : ''}
            </div>`;
        }

        function renderKpis(s) {
            const acceptance = s.interventions_accepted && s.interventions_total
                ? Math.round((s.interventions_accepted / s.interventions_total) * 100) + '%'
                : '—';
            const coverage = s.sessions_observed > 0
                ? Math.round(s.coached_sessions / s.sessions_observed * 100) + '%'
                : '—';
            const intensity = s.coached_sessions > 0
                ? (s.interventions_total / s.coached_sessions).toFixed(1)
                : '—';
            document.getElementById('kpi-grid').innerHTML = [
                comparedKpi('Estimated value', s.value_cents, 'currency'),
                comparedKpi('Conversation turns', s.turns, 'count'),
                plainKpi('Interventions',
                    fmtNum(s.interventions_total),
                    `${intensity} per coached session · ${coverage} of ${fmtNum(s.sessions_observed)} sessions coached`),
                plainKpi('Acceptance', acceptance,
                    `${s.interventions_accepted} of ${s.interventions_total} accepted`),
            ].join('');
        }

        function renderCategories(s) {
            if (!s.by_category.length) {
                document.getElementById('categories').innerHTML =
                    '<div class="rounded-xl border border-dashed border-gray-200 dark:border-gray-800 p-6 text-center text-sm text-gray-400">No interventions in this scope.</div>';
                return;
            }
            const max = Math.max(...s.by_category.map(c => c.interventions));
            const cards = s.by_category.map(c => {
                const st = COACH_STYLES[c.category] || COACH_STYLES.other;
                const pct = max ? Math.round(100 * c.interventions / max) : 0;
                const acc = c.interventions ? Math.round(100 * c.accepted / c.interventions) : 0;
                return `<div class="rounded-xl border ${st.border} ${st.bg} p-4">
                    <div class="flex items-center justify-between mb-1.5">
                        <span class="inline-flex items-center gap-1.5 text-sm font-semibold ${st.text}">
                            <span class="w-2 h-2 rounded-full ${st.dot}"></span>${st.label}
                        </span>
                        <span class="text-xs text-gray-500 dark:text-gray-400">${fmtMoney(c.estimated_savings_cents)}</span>
                    </div>
                    <div class="flex items-baseline gap-2 mb-2">
                        <span class="text-2xl font-bold text-gray-900 dark:text-white">${c.interventions}</span>
                        <span class="text-xs text-gray-500 dark:text-gray-400">interventions · ${acc}% accepted</span>
                    </div>
                    <div class="h-1.5 rounded-full bg-white/60 dark:bg-black/30 overflow-hidden">
                        <div class="h-full ${st.dot}" style="width: ${pct}%"></div>
                    </div>
                </div>`;
            }).join('');
            document.getElementById('categories').innerHTML =
                `<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-3">${cards}</div>`;
        }

        function renderUtilityShift(s) {
            const el = document.getElementById('utility-shift');
            if (!s.utility_shifts.length) { el.innerHTML = ''; return; }
            // Shifts are only counted on coached sessions (gated upstream),
            // so coached_sessions is the right denominator. Show both the raw
            // count and the share of coached sessions for cross-scope comparison.
            const denom = s.coached_sessions || 0;
            const totalShifted = s.utility_shifts.reduce((acc, sh) => acc + sh.sessions, 0);
            const totalPct = denom > 0 ? Math.round(totalShifted / denom * 100) : 0;
            const rows = s.utility_shifts.map(sh => {
                const pct = denom > 0 ? Math.round(sh.sessions / denom * 100) : 0;
                return `
                <tr class="border-b border-gray-100 dark:border-gray-800 last:border-0">
                    <td class="py-2 pr-4 text-sm text-gray-500 dark:text-gray-400">${esc(sh.from_class)}</td>
                    <td class="py-2 pr-4 text-gray-300 dark:text-gray-700">→</td>
                    <td class="py-2 pr-4 text-sm font-medium text-gray-900 dark:text-white">${esc(sh.to_class)}</td>
                    <td class="py-2 pr-4 text-right text-sm font-semibold text-gray-900 dark:text-white tabular-nums">${sh.sessions}</td>
                    <td class="py-2 text-right text-sm text-gray-500 dark:text-gray-400 tabular-nums w-16">${pct}%</td>
                </tr>`;
            }).join('');
            el.innerHTML = `<div class="rounded-xl border border-gray-200 dark:border-gray-800 bg-white dark:bg-gray-900 p-4">
                <div class="flex items-baseline justify-between mb-3">
                    <div class="text-[0.7rem] uppercase tracking-wider text-gray-500 dark:text-gray-400">Utility shifts (counterfactual → actual)</div>
                    <div class="text-[0.7rem] text-gray-400">${totalShifted} of ${denom} coached · ${totalPct}%</div>
                </div>
                <table class="w-full"><tbody>${rows}</tbody></table>
            </div>`;
        }

        function renderFeed(items) {
            const el = document.getElementById('feed');
            if (!items.length) {
                el.innerHTML = '<div class="rounded-xl border border-dashed border-gray-200 dark:border-gray-800 p-6 text-center text-sm text-gray-400">No interventions in this scope.</div>';
                return;
            }
            el.innerHTML = items.map(it => {
                const st = COACH_STYLES[it.category] || COACH_STYLES.other;
                const date = new Date(it.timestamp).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
                const accepted = it.accepted === true
                    ? '<span class="text-[0.7rem] font-medium text-emerald-700 dark:text-emerald-400">Accepted</span>'
                    : it.accepted === false
                    ? '<span class="text-[0.7rem] font-medium text-gray-500 dark:text-gray-400">Ignored</span>'
                    : '';
                const savings = it.estimated_savings_cents
                    ? `<span class="text-[0.7rem] text-gray-500 dark:text-gray-400">${fmtMoney(it.estimated_savings_cents)} saved</span>`
                    : '';
                const sources = (it.sources || []).slice(0, 2).map(u =>
                    `<a href="${esc(u)}" target="_blank" rel="noopener" class="text-[0.7rem] text-blue-600 dark:text-blue-400 hover:underline">${esc(u.replace(/^https?:\/\//, '').slice(0, 40))}</a>`
                ).join('<span class="mx-1 text-gray-300 dark:text-gray-700">·</span>');

                return `<div class="rounded-xl border ${st.border} ${st.bg} p-4 mb-3">
                    <div class="flex items-center justify-between gap-2 mb-2">
                        <div class="flex items-center gap-2 flex-wrap">
                            <span class="inline-flex items-center gap-1.5 text-xs font-semibold ${st.text}">
                                <span class="w-2 h-2 rounded-full ${st.dot}"></span>${st.label}
                            </span>
                            <span class="text-xs text-gray-500 dark:text-gray-400">${esc(it.kind.replace(/_/g, ' '))} · ${esc(it.mode)}</span>
                        </div>
                        <div class="flex items-center gap-2">
                            ${accepted}${savings}
                            <span class="text-[0.7rem] text-gray-400">${date}</span>
                        </div>
                    </div>
                    <p class="text-sm text-gray-800 dark:text-gray-200 mb-2 leading-relaxed">${esc(it.content)}</p>
                    ${it.quoted_span ? `<div class="text-xs ${st.text} opacity-80 mb-2">
                        <span class="font-mono bg-white/60 dark:bg-black/30 px-1.5 py-0.5 rounded">${esc(it.quoted_span)}</span>
                    </div>` : ''}
                    <div class="flex items-center justify-between gap-2 flex-wrap text-xs">
                        <span class="text-gray-500 dark:text-gray-400">
                            <a href="/sessions/${encodeURIComponent(it.user_id)}" class="text-blue-600 dark:text-blue-400 hover:underline">${esc(it.user_id)}</a>
                            <span class="mx-1 text-gray-300 dark:text-gray-700">·</span>
                            <a href="/session/${encodeURIComponent(it.user_id)}/${encodeURIComponent(it.session_id)}" class="text-blue-600 dark:text-blue-400 hover:underline">View session</a>
                        </span>
                        ${sources ? `<div class="flex items-center gap-1">${sources}</div>` : ''}
                    </div>
                </div>`;
            }).join('');
        }

        function styleFilters() {
            document.querySelectorAll('.filter-btn').forEach(btn => {
                const active = btn.dataset.filter === activeFilter;
                btn.className = 'filter-btn px-3 py-1.5 rounded-lg text-xs font-medium border transition-colors '
                    + (active
                        ? 'bg-gray-900 dark:bg-white text-white dark:text-gray-900 border-gray-900 dark:border-white'
                        : 'bg-white dark:bg-gray-800 text-gray-600 dark:text-gray-400 border-gray-200 dark:border-gray-700 hover:border-gray-400 dark:hover:border-gray-500');
            });
        }

        async function refresh() {
            styleFilters();
            const params = new URLSearchParams();
            if (activeFilter) params.set('category', activeFilter);
            if (orgFilter) params.set('org_id', orgFilter);
            const baseQs = params.toString() ? '?' + params.toString() : '';
            const feedParams = new URLSearchParams(params);
            feedParams.set('limit', '50');
            const [summary, feed] = await Promise.all([
                fetch('/api/coach/summary' + baseQs).then(r => r.json()),
                fetch('/api/coach/feed?' + feedParams.toString()).then(r => r.json()),
            ]);
            renderKpis(summary);
            renderCategories(summary);
            renderUtilityShift(summary);
            renderFeed(feed);
            renderOrgPill();
        }

        function renderOrgPill() {
            // Tiny applied-filter pill so it's clear the page is scoped.
            const existing = document.getElementById('org-pill-wrap');
            if (existing) existing.remove();
            if (!orgFilter) return;
            const wrap = document.createElement('div');
            wrap.id = 'org-pill-wrap';
            wrap.className = 'mb-3';
            wrap.innerHTML = `<span class="inline-flex items-center gap-1.5 pl-2 pr-1 py-1 rounded-md text-xs font-medium bg-blue-50 dark:bg-blue-950/40 text-blue-700 dark:text-blue-300 border border-blue-200 dark:border-blue-800/60">
                <span class="text-blue-500 dark:text-blue-400">Org:</span>
                <span>${esc(orgFilter)}</span>
                <a href="/exec/coach" class="ml-0.5 p-0.5 rounded hover:bg-blue-100 dark:hover:bg-blue-900/40" title="Clear org scope">
                    <svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
                </a>
            </span>`;
            document.getElementById('filters').after(wrap);
        }

        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                activeFilter = btn.dataset.filter;
                refresh();
            });
        });

        refresh();

        function esc(s) { const d = document.createElement('div'); d.textContent = s == null ? '' : String(s); return d.innerHTML; }
    </script>
</body>
</html>

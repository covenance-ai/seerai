<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>seerai — analytics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
    <script>if (localStorage.getItem('seerai_theme') === 'dark' || (!localStorage.getItem('seerai_theme') && matchMedia('(prefers-color-scheme:dark)').matches)) document.documentElement.classList.add('dark');</script>
    <script src="/static/nav.js" defer></script>
    <style>
        /* A small hover highlight for interactive marks (bubbles, heatmap cells) */
        .hx:hover { filter: brightness(1.2); cursor: pointer; }
        /* Tooltip for SVG marks */
        #chart-tip {
            position: fixed; z-index: 100; pointer-events: none;
            padding: 6px 10px; border-radius: 6px; font-size: 11px; line-height: 1.35;
            background: rgba(17,24,39,0.95); color: #f9fafb; white-space: nowrap;
            box-shadow: 0 10px 30px rgba(0,0,0,0.25);
            opacity: 0; transition: opacity 120ms ease;
        }
        html.dark #chart-tip { background: rgba(243,244,246,0.95); color: #111827; }
        #chart-tip.visible { opacity: 1; }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-950 text-gray-800 dark:text-gray-200 min-h-screen">
    <div class="max-w-6xl mx-auto px-4 py-8">
        <p class="text-sm text-gray-500 dark:text-gray-400 mb-1">
            <a href="/" class="text-blue-600 dark:text-blue-400 hover:underline">seerai</a>
            <span class="mx-1">/</span>
            <span class="text-gray-700 dark:text-gray-300">analytics</span>
        </p>
        <div class="flex items-end justify-between mb-6 gap-4 flex-wrap">
            <div>
                <h1 class="text-2xl font-bold text-gray-900 dark:text-white mb-1" id="title">Analytics</h1>
                <p class="text-sm text-gray-500 dark:text-gray-400" id="subtitle">Cross-department AI usage patterns. All figures over the trailing 30 days unless noted.</p>
            </div>
            <div id="org-picker" class="hidden"></div>
        </div>
        <div id="content"><p class="text-gray-400 text-center py-8">Loading…</p></div>
    </div>
    <div id="chart-tip"></div>

    <script>
    // ---------------- Utilities ----------------
    function esc(s) { const d = document.createElement('div'); d.textContent = s == null ? '' : s; return d.innerHTML; }
    function fmt$(n) {
        const sign = n < 0 ? '−' : '';
        return sign + '$' + Math.round(Math.abs(n)).toLocaleString();
    }
    function fmtK(n) { return n >= 1000 ? (n / 1000).toFixed(n >= 10000 ? 0 : 1) + 'k' : String(n); }
    function waitForReady() {
        return (window.seerai && window.seerai.ready) ? window.seerai.ready
            : new Promise(r => setTimeout(() => r(waitForReady()), 50));
    }

    // Consistent palette. Used for dept colors (scatter, provider bars) so
    // the reader can scan left-to-right across charts without re-checking the legend.
    const DEPT_PALETTE = ['#3B82F6', '#10B981', '#F59E0B', '#EC4899', '#8B5CF6', '#14B8A6', '#EF4444', '#6366F1', '#84CC16'];
    const UTIL_COLOR = {
        useful:       '#10B981',
        trivial:      '#60A5FA',
        non_work:     '#9CA3AF',
        harmful:      '#EF4444',
        unclassified: '#D1D5DB',
    };
    const UTIL_ORDER = ['useful', 'trivial', 'non_work', 'harmful', 'unclassified'];
    const UTIL_LABEL = { useful: 'Useful', trivial: 'Trivial', non_work: 'Non-work', harmful: 'Harmful', unclassified: 'Unclassified' };
    const PROV_COLOR = {
        anthropic: '#D97706',
        openai:    '#10B981',
        google:    '#3B82F6',
        mistral:   '#8B5CF6',
    };
    const PROV_LABEL = { anthropic: 'Anthropic', openai: 'OpenAI', google: 'Google', mistral: 'Mistral' };

    function provColor(p) { return PROV_COLOR[p] || '#9CA3AF'; }

    // Tooltip
    const tip = document.getElementById('chart-tip');
    function showTip(evt, html) {
        tip.innerHTML = html;
        tip.style.left = (evt.clientX + 12) + 'px';
        tip.style.top  = (evt.clientY + 12) + 'px';
        tip.classList.add('visible');
    }
    function hideTip() { tip.classList.remove('visible'); }

    // ---------------- Card wrapper ----------------
    function card(title, subtitle, body, opts) {
        opts = opts || {};
        const wide = opts.wide ? ' lg:col-span-2' : '';
        return `<section class="rounded-xl border border-gray-200 dark:border-gray-700/60 bg-white dark:bg-gray-900 p-5${wide}">
            <header class="mb-4">
                <h3 class="text-sm font-semibold text-gray-800 dark:text-gray-100">${esc(title)}</h3>
                ${subtitle ? `<p class="text-xs text-gray-500 dark:text-gray-400 mt-0.5">${esc(subtitle)}</p>` : ''}
            </header>
            <div>${body}</div>
        </section>`;
    }

    function legend(items) {
        return '<div class="flex flex-wrap gap-x-4 gap-y-1 text-xs text-gray-600 dark:text-gray-400 mt-3">'
            + items.map(i => `<span class="inline-flex items-center gap-1.5"><span class="inline-block w-2.5 h-2.5 rounded-sm" style="background:${i.color}"></span>${esc(i.label)}</span>`).join('')
            + '</div>';
    }

    // ---------------- KPI strip ----------------
    function kpiStrip(d) {
        const roi = d.roi;
        const roiColor = roi === null ? 'text-gray-400' : roi >= 1 ? 'text-emerald-500' : 'text-amber-500';
        const roiLabel = roi === null ? '—' : roi.toFixed(1) + 'x';
        const adoption = d.user_count > 0 ? Math.round(d.active_user_count / d.user_count * 100) : 0;
        const items = [
            { v: d.user_count,                     l: 'Users',             sub: d.active_user_count + ' active (30d)' },
            { v: adoption + '%',                   l: 'Adoption rate',     sub: d.active_user_count + ' / ' + d.user_count + ' used AI' },
            { v: fmtK(d.session_count),            l: 'Sessions (30d)',    sub: fmtK(d.message_count) + ' messages' },
            { v: fmt$(d.total_subscription_cost),  l: 'Subscriptions / mo',sub: '' },
            { v: fmt$(d.total_estimated_value),    l: 'Estimated value',   sub: '' },
            { v: roiLabel,                         l: 'ROI',               sub: '', cls: roiColor },
        ];
        return '<div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-6 gap-3 mb-6">'
            + items.map(it => `<div class="rounded-xl border border-gray-200 dark:border-gray-700/60 p-4 bg-white dark:bg-gray-900">
                <div class="text-2xl font-bold ${it.cls || 'text-gray-900 dark:text-white'}">${it.v}</div>
                <div class="text-xs text-gray-400 mt-0.5">${esc(it.l)}</div>
                ${it.sub ? `<div class="text-[0.65rem] text-gray-400 mt-0.5">${esc(it.sub)}</div>` : ''}
            </div>`).join('')
            + '</div>';
    }

    // ---------------- Chart 1: Department adoption ----------------
    // Bar = adoption RATE (active/total, 0–100%). The track is fixed-width so a
    // 100%-adoption dept of 5 and a 100%-adoption dept of 50 both draw full bars.
    // Raw counts (active/total) are shown as the side label so headcount isn't lost.
    // Sorted by rate desc — the question "who adopted?" reads top-to-bottom.
    function chartAdoption(depts) {
        if (!depts.length) return '<p class="text-gray-400 text-sm text-center py-4">No departments to display.</p>';
        const sorted = depts.slice().sort((a, b) => {
            const ra = a.user_count > 0 ? a.active_user_count / a.user_count : 0;
            const rb = b.user_count > 0 ? b.active_user_count / b.user_count : 0;
            return rb - ra;
        });
        let rows = '';
        for (const d of sorted) {
            const rate = d.user_count > 0 ? d.active_user_count / d.user_count * 100 : 0;
            const ratePct = Math.round(rate);
            // Color shifts amber→emerald as adoption climbs, so the eye can scan
            // for laggards without reading every label.
            const barColor = rate >= 75 ? '#10B981' : rate >= 40 ? '#3B82F6' : '#F59E0B';
            rows += `<div class="mb-3 last:mb-0">
                <div class="flex items-baseline justify-between text-xs mb-1">
                    <span class="font-medium text-gray-700 dark:text-gray-200">${esc(d.name)}</span>
                    <span class="text-gray-500 dark:text-gray-400 tabular-nums">${ratePct}% <span class="text-gray-400">· ${d.active_user_count}/${d.user_count}</span></span>
                </div>
                <div class="relative h-5 rounded bg-gray-100 dark:bg-gray-800 overflow-hidden">
                    <div class="absolute top-0 left-0 h-full rounded-r-sm" style="width:${rate}%;background:${barColor}"></div>
                </div>
            </div>`;
        }
        return rows + legend([
            { color: '#10B981', label: '≥75% adoption' },
            { color: '#3B82F6', label: '40–74%' },
            { color: '#F59E0B', label: '<40%' },
        ]);
    }

    // ---------------- Chart 2: Value vs Cost by dept ----------------
    // Bars are scaled per-active-user so dept size doesn't dominate the visual:
    // a small efficient dept and a large inefficient dept are now comparable.
    // Totals are shown as a faint annotation so absolute $ exposure isn't lost.
    // Sorted by value-per-user desc.
    function chartValueCost(depts) {
        if (!depts.length) return '<p class="text-gray-400 text-sm text-center py-4">No data.</p>';
        const enriched = depts.map(d => {
            const denom = d.active_user_count || d.user_count || 0;
            return {
                d,
                valPerUser: denom > 0 ? d.estimated_value / denom : 0,
                subPerUser: denom > 0 ? d.subscription_cost / denom : 0,
                denom,
            };
        });
        const vmax = Math.max(1, ...enriched.map(e => Math.max(Math.abs(e.valPerUser), e.subPerUser)));
        const sorted = enriched.slice().sort((a, b) => b.valPerUser - a.valPerUser);
        let rows = '';
        for (const { d, valPerUser, subPerUser, denom } of sorted) {
            const roi = d.roi;
            const negative = valPerUser < 0;
            const roiColor = roi === null ? 'text-gray-400'
                : roi < 0 ? 'text-red-500'
                : roi >= 1 ? 'text-emerald-500'
                : 'text-amber-500';
            const roiLabel = roi === null ? '—' : roi.toFixed(1) + 'x';
            const wSub = (subPerUser / vmax) * 100;
            const wVal = (Math.abs(valPerUser) / vmax) * 100;
            const valBg = negative ? '#EF4444' : '#10B981';
            const valLabelCls = negative ? 'text-red-500' : 'text-gray-700 dark:text-gray-200';
            const denomTag = denom > 0
                ? `${denom} active user${denom === 1 ? '' : 's'}`
                : 'no active users';
            rows += `<div class="mb-4 last:mb-0">
                <div class="flex items-baseline justify-between text-xs mb-1.5">
                    <span class="font-medium text-gray-700 dark:text-gray-200">${esc(d.name)} <span class="text-[0.65rem] text-gray-400 font-normal">· ${denomTag}</span></span>
                    <span class="${roiColor} font-semibold">${roiLabel} <span class="text-[0.65rem] text-gray-400 font-normal">ROI</span></span>
                </div>
                <div class="space-y-1">
                    <div class="flex items-center gap-2 text-[0.68rem] text-gray-500 dark:text-gray-400">
                        <span class="w-14 shrink-0">Value/user</span>
                        <div class="flex-1 h-3 bg-gray-100 dark:bg-gray-800 rounded overflow-hidden">
                            <div class="h-full rounded-r-sm" style="width:${wVal}%;background:${valBg}"></div>
                        </div>
                        <span class="w-24 text-right ${valLabelCls} tabular-nums">${negative ? '−' : ''}${fmt$(Math.abs(valPerUser))} <span class="text-[0.6rem] text-gray-400">(${fmt$(d.estimated_value)})</span></span>
                    </div>
                    <div class="flex items-center gap-2 text-[0.68rem] text-gray-500 dark:text-gray-400">
                        <span class="w-14 shrink-0">Sub $/user</span>
                        <div class="flex-1 h-3 bg-gray-100 dark:bg-gray-800 rounded overflow-hidden">
                            <div class="h-full rounded-r-sm" style="width:${wSub}%;background:#94A3B8"></div>
                        </div>
                        <span class="w-24 text-right text-gray-700 dark:text-gray-200 tabular-nums">${fmt$(subPerUser)} <span class="text-[0.6rem] text-gray-400">(${fmt$(d.subscription_cost)})</span></span>
                    </div>
                </div>
            </div>`;
        }
        return rows + '<p class="text-[0.65rem] text-gray-400 mt-2">Bars: per active user (30d). Parens: dept totals.</p>';
    }

    // ---------------- Chart 3: Utility mix by dept (100% stacked) ----------------
    function chartUtilityMix(depts) {
        if (!depts.length) return '<p class="text-gray-400 text-sm text-center py-4">No data.</p>';
        let rows = '';
        for (const d of depts) {
            const u = d.utility;
            const total = UTIL_ORDER.reduce((s, k) => s + (u[k] || 0), 0);
            if (total === 0) {
                rows += `<div class="mb-2.5 last:mb-0 text-xs">
                    <div class="flex items-baseline justify-between mb-1"><span class="font-medium text-gray-700 dark:text-gray-200">${esc(d.name)}</span><span class="text-gray-400">no sessions</span></div>
                    <div class="h-4 bg-gray-100 dark:bg-gray-800 rounded"></div></div>`;
                continue;
            }
            let bar = '';
            let tipLines = `<div class="font-semibold mb-1">${esc(d.name)} · ${total} sessions</div>`;
            for (const k of UTIL_ORDER) {
                const n = u[k] || 0;
                if (!n) continue;
                const pct = n / total * 100;
                bar += `<div style="width:${pct}%;background:${UTIL_COLOR[k]}" title="${UTIL_LABEL[k]}: ${n} (${Math.round(pct)}%)"></div>`;
                tipLines += `<div>${UTIL_LABEL[k]}: ${n} (${Math.round(pct)}%)</div>`;
            }
            rows += `<div class="mb-2.5 last:mb-0 text-xs">
                <div class="flex items-baseline justify-between mb-1"><span class="font-medium text-gray-700 dark:text-gray-200">${esc(d.name)}</span><span class="text-gray-400 tabular-nums">${total}</span></div>
                <div class="stacked-bar h-4 rounded overflow-hidden flex bg-gray-100 dark:bg-gray-800" data-tip='${tipLines.replace(/'/g, "&#39;")}'>${bar}</div>
            </div>`;
        }
        return rows + legend(UTIL_ORDER.filter(k => depts.some(d => d.utility[k])).map(k => ({ color: UTIL_COLOR[k], label: UTIL_LABEL[k] })));
    }

    // ---------------- Chart 4: Provider mix by dept (100% stacked) ----------------
    function chartProviderMix(depts) {
        if (!depts.length) return '<p class="text-gray-400 text-sm text-center py-4">No data.</p>';
        const allProviders = new Set();
        depts.forEach(d => Object.keys(d.provider_counts || {}).forEach(p => allProviders.add(p)));
        const orderedProviders = ['anthropic', 'openai', 'google', 'mistral']
            .filter(p => allProviders.has(p))
            .concat([...allProviders].filter(p => !PROV_COLOR[p]));

        let rows = '';
        for (const d of depts) {
            const counts = d.provider_counts || {};
            const total = Object.values(counts).reduce((s, n) => s + n, 0);
            if (total === 0) {
                rows += `<div class="mb-2.5 last:mb-0 text-xs">
                    <div class="flex items-baseline justify-between mb-1"><span class="font-medium text-gray-700 dark:text-gray-200">${esc(d.name)}</span><span class="text-gray-400">—</span></div>
                    <div class="h-4 bg-gray-100 dark:bg-gray-800 rounded"></div></div>`;
                continue;
            }
            let bar = '';
            let tipLines = `<div class="font-semibold mb-1">${esc(d.name)} · ${total} sessions</div>`;
            for (const p of orderedProviders) {
                const n = counts[p] || 0;
                if (!n) continue;
                const pct = n / total * 100;
                bar += `<div style="width:${pct}%;background:${provColor(p)}"></div>`;
                tipLines += `<div>${esc(PROV_LABEL[p] || p)}: ${n} (${Math.round(pct)}%)</div>`;
            }
            rows += `<div class="mb-2.5 last:mb-0 text-xs">
                <div class="flex items-baseline justify-between mb-1"><span class="font-medium text-gray-700 dark:text-gray-200">${esc(d.name)}</span><span class="text-gray-400 tabular-nums">${total}</span></div>
                <div class="stacked-bar h-4 rounded overflow-hidden flex bg-gray-100 dark:bg-gray-800" data-tip='${tipLines.replace(/'/g, "&#39;")}'>${bar}</div>
            </div>`;
        }
        return rows + legend(orderedProviders.map(p => ({ color: provColor(p), label: PROV_LABEL[p] || p })));
    }

    // ---------------- Chart 5: ROI × paygrade scatter ----------------
    // Each user a bubble: x = hourly_rate, y = ROI, size ~ sessions, color = dept.
    // Y log-ish (sqrt) because ROI spans orders of magnitude with flat-rate subs.
    function chartScatter(users, depts) {
        const pts = users.filter(u => u.hourly_rate != null && u.roi != null && u.session_count > 0);
        if (!pts.length) return '<p class="text-gray-400 text-sm text-center py-4">No users with ROI data.</p>';

        const deptColor = {};
        depts.forEach((d, i) => { deptColor[d.org_id] = DEPT_PALETTE[i % DEPT_PALETTE.length]; });

        const W = 520, H = 300, pad = { l: 40, r: 12, t: 10, b: 28 };
        const innerW = W - pad.l - pad.r, innerH = H - pad.t - pad.b;

        const xMin = Math.min(...pts.map(p => p.hourly_rate)) * 0.95;
        const xMax = Math.max(...pts.map(p => p.hourly_rate)) * 1.05;
        const roiMax = Math.max(...pts.map(p => p.roi), 1);
        const roiMin = Math.min(...pts.map(p => p.roi), 0);
        // Signed-sqrt scale: tames outliers, keeps separation, and — importantly —
        // lets negative ROI users land in a visible "below zero" band rather than
        // stacking on the x-axis.
        const sSqrt = v => (v < 0 ? -Math.sqrt(-v) : Math.sqrt(v));
        const yLo = sSqrt(Math.min(roiMin, 0)) * 1.05;
        const yHi = sSqrt(roiMax) * 1.05;
        const yRange = yHi - yLo || 1;

        const sMax = Math.max(...pts.map(p => p.session_count));
        const rad = s => 3 + 12 * Math.sqrt(s / sMax);

        const xScale = v => pad.l + ((v - xMin) / (xMax - xMin)) * innerW;
        const yScale = v => pad.t + innerH - ((sSqrt(v) - yLo) / yRange) * innerH;

        // x axis ticks (5)
        const xTicks = 5;
        let xAxis = '';
        for (let i = 0; i <= xTicks; i++) {
            const v = xMin + (xMax - xMin) * (i / xTicks);
            const x = xScale(v);
            xAxis += `<line x1="${x}" x2="${x}" y1="${pad.t + innerH}" y2="${pad.t + innerH + 4}" stroke="currentColor" stroke-opacity="0.3"/>
                <text x="${x}" y="${pad.t + innerH + 16}" text-anchor="middle" font-size="10" fill="currentColor" opacity="0.55">$${Math.round(v)}</text>`;
        }
        // y axis ticks — include negative values if any users are there
        const yTickCandidates = [-10, -5, -2, -1, 0, 1, 10, 50, 100, 250, 500];
        const yTickValues = yTickCandidates.filter(v => v >= Math.floor(roiMin) - 0.1 && v <= roiMax * 1.1);
        if (!yTickValues.includes(1) && roiMax >= 1) yTickValues.push(1);
        if (!yTickValues.includes(0)) yTickValues.push(0);
        yTickValues.sort((a, b) => a - b);
        let yAxis = '';
        // Shade the below-zero region so negative ROI is visually distinct.
        if (roiMin < 0) {
            const y0 = yScale(0);
            const yBot = pad.t + innerH;
            yAxis += `<rect x="${pad.l}" y="${y0}" width="${innerW}" height="${yBot - y0}" fill="#EF4444" fill-opacity="0.06"/>`;
        }
        for (const v of yTickValues) {
            const y = yScale(v);
            if (y < pad.t - 2 || y > pad.t + innerH + 2) continue;
            const isBreakeven = v === 1;
            const isZero = v === 0;
            const emphasis = isBreakeven ? 0.5 : isZero ? 0.45 : 0.1;
            const dash = (isBreakeven || isZero) ? '' : '2,3';
            yAxis += `<line x1="${pad.l - 4}" x2="${pad.l + innerW}" y1="${y}" y2="${y}" stroke="currentColor" stroke-opacity="${emphasis}" stroke-dasharray="${dash}"/>
                <text x="${pad.l - 6}" y="${y + 3}" text-anchor="end" font-size="10" fill="currentColor" opacity="0.55">${v}${isBreakeven ? 'x' : ''}</text>`;
        }

        let dots = '';
        for (const p of pts) {
            const cx = xScale(p.hourly_rate);
            const cy = yScale(p.roi);
            const r = rad(p.session_count);
            const color = deptColor[p.dept_id] || '#9CA3AF';
            const tipHtml = `<div class="font-semibold">${esc(p.user_id)}</div>
                <div>${esc(p.dept_name || '—')} · $${p.hourly_rate}/hr</div>
                <div>ROI: ${p.roi.toFixed(1)}x · ${p.session_count} sessions</div>
                <div>Value $${p.estimated_value.toFixed(0)} / sub $${p.subscription_cost.toFixed(0)}</div>`;
            dots += `<circle class="hx" cx="${cx}" cy="${cy}" r="${r}" fill="${color}" fill-opacity="0.7" stroke="${color}" stroke-width="1.5" data-tip='${tipHtml.replace(/'/g, "&#39;")}'/>`;
        }

        const svg = `<svg viewBox="0 0 ${W} ${H}" class="w-full h-72 text-gray-500 dark:text-gray-400">
            <text x="${pad.l + innerW / 2}" y="${H - 4}" text-anchor="middle" font-size="10" fill="currentColor" opacity="0.55">hourly rate ($/hr)</text>
            <text x="10" y="${pad.t + innerH / 2}" text-anchor="middle" font-size="10" fill="currentColor" opacity="0.55" transform="rotate(-90 10 ${pad.t + innerH / 2})">ROI (signed √ scale)</text>
            ${yAxis}
            ${xAxis}
            <line x1="${pad.l}" x2="${pad.l + innerW}" y1="${pad.t + innerH}" y2="${pad.t + innerH}" stroke="currentColor" stroke-opacity="0.4"/>
            <line x1="${pad.l}" x2="${pad.l}" y1="${pad.t}" y2="${pad.t + innerH}" stroke="currentColor" stroke-opacity="0.4"/>
            ${dots}
        </svg>`;

        return svg + legend(depts.map(d => ({ color: deptColor[d.org_id], label: d.name })));
    }

    // ---------------- Chart 6: Top users leaderboard ----------------
    // Each mini-bar segment is a click-target that deep-links to the user's
    // sessions view pre-filtered by that utility — so managers can go from
    // "Sales is negative" to "show me the harmful sessions" in two clicks.
    function chartTopUsers(users) {
        // Show a mix of top-by-value AND any negative-ROI users, so when a dept
        // has an ROI problem the offenders surface even if they aren't top 10.
        const active = users.filter(u => u.session_count > 0);
        const topByValue = active.slice(0, 10);
        const negatives = active.filter(u => u.estimated_value < 0 && !topByValue.includes(u));
        const rows_users = [...topByValue, ...negatives];
        if (!rows_users.length) return '<p class="text-gray-400 text-sm text-center py-4">No active users.</p>';

        const maxAbsValue = Math.max(...rows_users.map(u => Math.abs(u.estimated_value)), 1);
        let rows = '';
        rows_users.forEach((u, i) => {
            const roi = u.roi;
            const roiColor = roi === null ? 'text-gray-400'
                : roi < 0 ? 'text-red-500'
                : roi >= 1 ? 'text-emerald-500'
                : 'text-amber-500';
            const roiLabel = roi === null ? '—' : roi.toFixed(1) + 'x';
            const negative = u.estimated_value < 0;
            const barW = (Math.abs(u.estimated_value) / maxAbsValue) * 100;
            const valBg = negative ? '#EF4444' : '#10B981';
            const valLabelCls = negative ? 'text-red-500' : 'text-gray-700 dark:text-gray-200';
            const utilTotal = UTIL_ORDER.reduce((s, k) => s + (u.utility[k] || 0), 0) || 1;
            let miniBar = '';
            for (const k of UTIL_ORDER) {
                const n = u.utility[k] || 0;
                if (!n) continue;
                const pct = n / utilTotal * 100;
                const href = '/sessions/' + encodeURIComponent(u.user_id) + '?utility=' + k + '&sort=value-asc';
                const label = `${UTIL_LABEL[k]}: ${n} (${Math.round(pct)}%) — click to filter`;
                miniBar += `<a href="${href}" style="width:${pct}%;background:${UTIL_COLOR[k]}" class="block hover:brightness-125 transition" title="${esc(label)}"></a>`;
            }
            // Mark negative-ROI users visually (red row accent).
            const rowCls = negative
                ? 'border-b border-gray-100 dark:border-gray-800 last:border-b-0 bg-red-50/40 dark:bg-red-900/10 hover:bg-red-100/60 dark:hover:bg-red-900/20 transition-colors'
                : 'border-b border-gray-100 dark:border-gray-800 last:border-b-0 hover:bg-gray-50 dark:hover:bg-gray-800/40 transition-colors';
            const harmfulCell = u.harmful_count > 0
                ? `<a href="/sessions/${encodeURIComponent(u.user_id)}?utility=harmful&sort=value-asc" class="inline-flex items-center gap-1 text-[0.65rem] text-red-500 hover:text-red-700 dark:hover:text-red-400 font-semibold" title="View ${u.harmful_count} harmful session${u.harmful_count === 1 ? '' : 's'}">⚠ ${u.harmful_count}</a>`
                : '<span class="text-gray-300 dark:text-gray-700 text-[0.65rem]">—</span>';
            rows += `<tr class="${rowCls}">
                <td class="py-2 pl-2 text-gray-400 tabular-nums w-6">${negative ? '!' : i + 1}</td>
                <td class="py-2 px-2">
                    <a href="/sessions/${encodeURIComponent(u.user_id)}" class="text-blue-600 dark:text-blue-400 hover:underline text-sm font-medium">${esc(u.user_id)}</a>
                    <div class="text-[0.65rem] text-gray-400">${esc(u.dept_name || '—')}</div>
                </td>
                <td class="py-2 px-2 text-right text-sm text-gray-700 dark:text-gray-200 tabular-nums">${u.session_count}</td>
                <td class="py-2 px-2">
                    <div class="flex items-center gap-2">
                        <div class="flex-1 h-2 bg-gray-100 dark:bg-gray-800 rounded overflow-hidden">
                            <div class="h-full" style="width:${barW}%;background:${valBg}"></div>
                        </div>
                        <span class="text-xs ${valLabelCls} tabular-nums w-12 text-right">${fmt$(u.estimated_value)}</span>
                    </div>
                </td>
                <td class="py-2 px-2 text-right text-sm font-medium ${roiColor} tabular-nums w-16">${roiLabel}</td>
                <td class="py-2 px-2">
                    <div class="flex h-2 w-16 rounded overflow-hidden bg-gray-100 dark:bg-gray-800">${miniBar}</div>
                </td>
                <td class="py-2 pr-2 text-center w-10">${harmfulCell}</td>
            </tr>`;
        });
        return `<table class="w-full text-sm">
            <thead><tr class="text-xs text-gray-400 uppercase tracking-wider text-left">
                <th class="pl-2 pb-2 w-6">#</th>
                <th class="px-2 pb-2">User</th>
                <th class="px-2 pb-2 text-right">Sessions</th>
                <th class="px-2 pb-2">Value / mo</th>
                <th class="px-2 pb-2 text-right">ROI</th>
                <th class="px-2 pb-2">Mix</th>
                <th class="pr-2 pb-2 text-center" title="Harmful (QA-flagged) sessions — click to view">⚠</th>
            </tr></thead>
            <tbody>${rows}</tbody></table>
            <p class="text-[0.65rem] text-gray-400 mt-2">Click any utility segment in the Mix bar to see that slice of a user's sessions. Negative-ROI users included even when outside top 10.</p>`;
    }

    // ---------------- Chart 7: Weekly activity (stacked area) ----------------
    function chartWeekly(weekly) {
        const totals = weekly.map(w => UTIL_ORDER.reduce((s, k) => s + (w[k] || 0), 0));
        const max = Math.max(...totals, 1);
        if (totals.every(t => t === 0)) return '<p class="text-gray-400 text-sm text-center py-4">No activity data.</p>';
        const W = 560, H = 210, pad = { l: 36, r: 10, t: 8, b: 32 };
        const innerW = W - pad.l - pad.r, innerH = H - pad.t - pad.b;
        const step = innerW / Math.max(weekly.length - 1, 1);
        const x = i => pad.l + i * step;
        const y = v => pad.t + innerH - (v / max) * innerH;

        // Build stacked areas in UTIL_ORDER (useful at the bottom).
        const series = UTIL_ORDER.map(k => weekly.map(w => w[k] || 0));
        const stacks = series.map(() => new Array(weekly.length).fill(0));
        for (let i = 0; i < weekly.length; i++) {
            let acc = 0;
            for (let s = 0; s < series.length; s++) {
                acc += series[s][i];
                stacks[s][i] = acc;
            }
        }

        const areas = UTIL_ORDER.map((k, s) => {
            const top = stacks[s];
            const bottom = s === 0 ? new Array(weekly.length).fill(0) : stacks[s - 1];
            if (top.every(v => v === bottom[0])) return '';
            let path = `M ${x(0)},${y(bottom[0])}`;
            for (let i = 0; i < weekly.length; i++) path += ` L ${x(i)},${y(top[i])}`;
            for (let i = weekly.length - 1; i >= 0; i--) path += ` L ${x(i)},${y(bottom[i])}`;
            path += ' Z';
            return `<path d="${path}" fill="${UTIL_COLOR[k]}" fill-opacity="0.85" stroke="${UTIL_COLOR[k]}" stroke-opacity="0.4"/>`;
        }).join('');

        // x-axis labels: show first, last, and a few in the middle
        let xAxis = '';
        const labelIdx = new Set([0, weekly.length - 1, Math.floor(weekly.length / 3), Math.floor(weekly.length * 2 / 3)]);
        for (let i = 0; i < weekly.length; i++) {
            const xx = x(i);
            if (labelIdx.has(i)) {
                const d = new Date(weekly[i].week_start);
                const label = (d.getUTCMonth() + 1) + '/' + d.getUTCDate();
                xAxis += `<text x="${xx}" y="${pad.t + innerH + 16}" text-anchor="middle" font-size="10" fill="currentColor" opacity="0.55">${label}</text>`;
            }
            xAxis += `<line x1="${xx}" x2="${xx}" y1="${pad.t + innerH}" y2="${pad.t + innerH + 3}" stroke="currentColor" stroke-opacity="0.3"/>`;
        }
        // y-axis ticks
        let yAxis = '';
        const yTicks = [0, Math.round(max / 2), max];
        for (const v of yTicks) {
            const yy = y(v);
            yAxis += `<line x1="${pad.l}" x2="${pad.l + innerW}" y1="${yy}" y2="${yy}" stroke="currentColor" stroke-opacity="0.1" stroke-dasharray="2,3"/>
                <text x="${pad.l - 6}" y="${yy + 3}" text-anchor="end" font-size="10" fill="currentColor" opacity="0.55">${fmtK(v)}</text>`;
        }

        // Invisible hover cells to show per-week totals
        let hovers = '';
        const cellW = step;
        for (let i = 0; i < weekly.length; i++) {
            const w = weekly[i];
            const total = totals[i];
            const tipHtml = `<div class="font-semibold">${esc(w.week_start)} · ${total} sessions</div>`
                + UTIL_ORDER.filter(k => (w[k] || 0) > 0).map(k => `<div>${UTIL_LABEL[k]}: ${w[k]}</div>`).join('');
            hovers += `<rect class="hx" x="${x(i) - cellW / 2}" y="${pad.t}" width="${cellW}" height="${innerH}" fill="transparent" data-tip='${tipHtml.replace(/'/g, "&#39;")}'/>`;
        }

        const svg = `<svg viewBox="0 0 ${W} ${H}" class="w-full h-56 text-gray-500 dark:text-gray-400">
            ${yAxis}
            ${areas}
            ${hovers}
            ${xAxis}
            <line x1="${pad.l}" x2="${pad.l + innerW}" y1="${pad.t + innerH}" y2="${pad.t + innerH}" stroke="currentColor" stroke-opacity="0.4"/>
        </svg>`;
        return svg + legend(UTIL_ORDER.filter(k => series[UTIL_ORDER.indexOf(k)].some(v => v > 0)).map(k => ({ color: UTIL_COLOR[k], label: UTIL_LABEL[k] })));
    }

    // ---------------- Chart 8: Hour × weekday heatmap ----------------
    function chartHeatmap(grid) {
        const max = Math.max(...grid.flat(), 1);
        const DAYS = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];
        let cells = '<div class="inline-grid" style="grid-template-columns: 28px repeat(24, 1fr);gap:2px">';
        // header row
        cells += '<div></div>';
        for (let h = 0; h < 24; h++) {
            cells += `<div class="text-[0.55rem] text-gray-400 text-center">${h % 3 === 0 ? h : ''}</div>`;
        }
        // day rows
        for (let d = 0; d < 7; d++) {
            cells += `<div class="text-[0.6rem] text-gray-400 text-right pr-1 leading-4">${DAYS[d]}</div>`;
            for (let h = 0; h < 24; h++) {
                const v = grid[d][h];
                const intensity = v / max;  // 0..1
                const alpha = v === 0 ? 0 : 0.15 + 0.85 * intensity;
                const tipHtml = `<div class="font-semibold">${DAYS[d]} ${String(h).padStart(2,'0')}:00 UTC</div><div>${v} session${v === 1 ? '' : 's'}</div>`;
                cells += `<div class="hx rounded-sm" style="background:rgba(59,130,246,${alpha});aspect-ratio:1;min-height:14px" data-tip='${tipHtml.replace(/'/g, "&#39;")}'></div>`;
            }
        }
        cells += '</div>';
        return `<div class="overflow-x-auto"><div class="min-w-[540px]">${cells}</div></div>
            <p class="text-[0.65rem] text-gray-400 mt-2">Times in UTC. Darker = more sessions in that hour.</p>`;
    }

    // ---------------- Render orchestrator ----------------
    function render(container, d) {
        container.innerHTML = kpiStrip(d)
            + '<div class="grid grid-cols-1 lg:grid-cols-2 gap-4 mb-4">'
                + card('Department adoption', '% of headcount with ≥1 session in 30d',           chartAdoption(d.departments))
                + card('Value vs subscription cost', 'Per active user — comparable across dept sizes', chartValueCost(d.departments))
                + card('Session utility mix by department', '% of sessions classified useful / trivial / non-work / harmful', chartUtilityMix(d.departments))
                + card('Provider mix by department',   'Which tools each team reaches for',        chartProviderMix(d.departments))
            + '</div>'
            + '<div class="grid grid-cols-1 lg:grid-cols-2 gap-4 mb-4">'
                + card('ROI vs paygrade', 'Each dot = one user · size ~ session count · color = department', chartScatter(d.users, d.departments))
                + card('Top users by estimated value', 'Last 30 days — power users to learn from', chartTopUsers(d.users))
            + '</div>'
            + '<div class="grid grid-cols-1 lg:grid-cols-2 gap-4">'
                + card('Weekly activity (' + d.weekly.length + ' weeks)', 'Stacked by utility class — shows adoption and quality together', chartWeekly(d.weekly))
                + card('Hour × weekday heatmap', 'When sessions happen — reveals off-hours usage', chartHeatmap(d.hour_weekday))
            + '</div>';

        // Wire tooltips for any element with data-tip.
        container.querySelectorAll('[data-tip]').forEach(el => {
            el.addEventListener('mousemove', e => showTip(e, el.getAttribute('data-tip')));
            el.addEventListener('mouseleave', hideTip);
        });
    }

    function renderOrgPicker(roots, currentId, onChange) {
        const el = document.getElementById('org-picker');
        if (roots.length <= 1) return;
        let html = '<select class="rounded-lg border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-900 px-3 py-1.5 text-sm">';
        for (const r of roots) {
            html += `<option value="${esc(r.org_id)}"${r.org_id === currentId ? ' selected' : ''}>${esc(r.name)}</option>`;
        }
        html += '</select>';
        el.innerHTML = html;
        el.classList.remove('hidden');
        el.querySelector('select').addEventListener('change', e => onChange(e.target.value));
    }

    function loadAnalytics(orgId, rootName) {
        document.getElementById('title').textContent = 'Analytics — ' + rootName;
        const el = document.getElementById('content');
        el.innerHTML = '<p class="text-gray-400 text-center py-8">Loading…</p>';
        fetch('/api/analytics/org/' + encodeURIComponent(orgId))
            .then(r => { if (!r.ok) throw new Error('' + r.status); return r.json(); })
            .then(data => render(el, data))
            .catch(e => {
                el.innerHTML = '<p class="text-red-400 text-center py-8">Error: ' + esc(e.message) + '</p>';
            });
    }

    // ---------------- Bootstrap ----------------
    waitForReady().then(() => {
        const user = window.seerai.getCurrentUser();
        if (!user) {
            document.getElementById('content').innerHTML = '<p class="text-gray-400 text-center py-8">Select a user to view analytics.</p>';
            return;
        }

        if (user.role === 'admin') {
            // Admin sees a picker across all root orgs.
            fetch('/api/orgs').then(r => r.json()).then(roots => {
                if (!roots.length) {
                    document.getElementById('content').innerHTML = '<p class="text-gray-400 text-center py-8">No organizations.</p>';
                    return;
                }
                let current = roots[0];
                renderOrgPicker(roots, current.org_id, newId => {
                    const r = roots.find(x => x.org_id === newId);
                    loadAnalytics(r.org_id, r.name);
                });
                loadAnalytics(current.org_id, current.name);
            });
            return;
        }

        if (!user.org_id) {
            document.getElementById('content').innerHTML = '<p class="text-gray-400 text-center py-8">No organization assigned.</p>';
            return;
        }

        fetch('/api/orgs/' + encodeURIComponent(user.org_id)).then(r => r.json())
            .then(org => {
                const rootId = org.path[0];
                return fetch('/api/orgs/' + encodeURIComponent(rootId)).then(r => r.json());
            })
            .then(root => loadAnalytics(root.org_id, root.name))
            .catch(e => {
                document.getElementById('content').innerHTML = '<p class="text-red-400 text-center py-8">Error: ' + esc(e.message) + '</p>';
            });
    });
    </script>
</body>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>seerai — my sessions</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0f1117; color: #e0e0e0;
            max-width: 960px; margin: 2rem auto; padding: 0 1rem;
        }
        h1 { margin-bottom: 0.3rem; color: #fff; }
        .breadcrumb { color: #888; margin-bottom: 2rem; }
        .breadcrumb a { color: #60a5fa; text-decoration: none; }
        .breadcrumb a:hover { text-decoration: underline; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 0.6rem 0.8rem; color: #888; border-bottom: 1px solid #2a2d35; font-weight: 500; }
        td { padding: 0.6rem 0.8rem; border-bottom: 1px solid #1e2028; }
        tr:hover td { background: #1a1d25; }
        a { color: #60a5fa; text-decoration: none; }
        a:hover { text-decoration: underline; }
        .badge { display: inline-block; padding: 0.15rem 0.5rem; border-radius: 4px; font-size: 0.8rem; }
        .badge-user { background: #1e3a5f; color: #93c5fd; }
        .badge-ai { background: #1a3a2a; color: #86efac; }
        .badge-error { background: #3b1c1c; color: #fca5a5; }
        .empty { color: #666; padding: 2rem; text-align: center; }
    </style>
</head>
<body>
    <p class="breadcrumb"><a href="/">seerai</a> / my sessions</p>
    <h1>My Sessions</h1>
    <div id="content"><p class="empty">Loading...</p></div>
    <script>
        const userId = decodeURIComponent(window.location.pathname.split('/')[2]);

        fetch(`/api/users/${encodeURIComponent(userId)}/sessions`)
            .then(r => r.json())
            .then(sessions => {
                const el = document.getElementById('content');
                if (!sessions.length) {
                    el.innerHTML = '<p class="empty">No sessions yet.</p>';
                    return;
                }
                let html = '<table><thead><tr><th>Session</th><th>Events</th><th>Last Event</th><th>Last Active</th></tr></thead><tbody>';
                for (const s of sessions) {
                    const t = new Date(s.last_event_at).toLocaleString();
                    const badge = s.last_event_type ? `<span class="badge badge-${s.last_event_type === 'error' ? 'error' : s.last_event_type === 'ai_message' ? 'ai' : 'user'}">${s.last_event_type}</span>` : '';
                    const shortId = s.session_id.length > 20 ? s.session_id.slice(0, 20) + '...' : s.session_id;
                    html += `<tr>
                        <td><a href="/my/${encodeURIComponent(userId)}/${encodeURIComponent(s.session_id)}" title="${esc(s.session_id)}">${esc(shortId)}</a></td>
                        <td>${s.event_count}</td>
                        <td>${badge}</td>
                        <td>${t}</td>
                    </tr>`;
                }
                html += '</tbody></table>';
                el.innerHTML = html;
            })
            .catch(e => {
                document.getElementById('content').innerHTML = '<p class="empty">Error: ' + e.message + '</p>';
            });

        function esc(s) {
            const d = document.createElement('div');
            d.textContent = s;
            return d.innerHTML;
        }
    </script>
</body>
</html>

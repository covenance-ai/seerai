<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>seerai — conversation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
    <script>if (localStorage.getItem('seerai_theme') === 'dark' || (!localStorage.getItem('seerai_theme') && matchMedia('(prefers-color-scheme:dark)').matches)) document.documentElement.classList.add('dark');</script>
    <script src="/static/icons.js"></script>
    <script src="/static/nav.js" defer></script>
    <style>
        .coach-diff del { background: rgba(239,68,68,.18); text-decoration: line-through; text-decoration-color: rgba(239,68,68,.6); padding: 0 2px; border-radius: 3px; }
        .coach-diff ins { background: rgba(16,185,129,.18); text-decoration: none; padding: 0 2px; border-radius: 3px; }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-950 text-gray-800 dark:text-gray-200 min-h-screen">
    <div class="max-w-4xl mx-auto px-4 py-8" data-privacy-class="individual">
        <div class="flex items-start justify-between gap-3 mb-6">
            <p class="text-sm text-gray-500 dark:text-gray-400">
                <a href="/" class="text-blue-600 dark:text-blue-400 hover:underline">seerai</a>
                <span class="mx-1">/</span>
                <span id="company-badge"></span>
                <a href="" id="user-link" class="text-blue-600 dark:text-blue-400 hover:underline"><span id="uid"></span></a>
                <span class="mx-1">/</span>
                <span id="sid" class="text-gray-700 dark:text-gray-300"></span>
            </p>
            <div id="flag-controls" class="shrink-0"></div>
        </div>
        <div id="flag-banner"></div>
        <div id="coach-summary"></div>
        <div id="content"><p class="text-gray-400 text-center py-8">Loading...</p></div>
    </div>

    <script>
        const parts = window.location.pathname.split('/');
        const userId = decodeURIComponent(parts[2]);
        const sessionId = decodeURIComponent(parts[3]);
        document.getElementById('uid').textContent = userId;
        document.getElementById('sid').textContent = sessionId.length > 24 ? sessionId.slice(0, 24) + '...' : sessionId;
        document.getElementById('user-link').href = `/sessions/${encodeURIComponent(userId)}`;

        // ─── Coach category styles ─────────────────────────────────────
        const COACH_STYLES = {
            factuality: { label: 'Factuality', dot: 'bg-rose-500', text: 'text-rose-700 dark:text-rose-300', bg: 'bg-rose-50 dark:bg-rose-900/20', border: 'border-rose-300 dark:border-rose-700/50' },
            efficiency: { label: 'Efficiency', dot: 'bg-sky-500', text: 'text-sky-700 dark:text-sky-300', bg: 'bg-sky-50 dark:bg-sky-900/20', border: 'border-sky-300 dark:border-sky-700/50' },
            sources:    { label: 'Sources',    dot: 'bg-violet-500', text: 'text-violet-700 dark:text-violet-300', bg: 'bg-violet-50 dark:bg-violet-900/20', border: 'border-violet-300 dark:border-violet-700/50' },
            other:      { label: 'Other',      dot: 'bg-amber-500', text: 'text-amber-700 dark:text-amber-300', bg: 'bg-amber-50 dark:bg-amber-900/20', border: 'border-amber-300 dark:border-amber-700/50' },
        };
        const UTILITY_TEXT = {
            harmful:  'text-red-600 dark:text-red-400',
            non_work: 'text-gray-500 dark:text-gray-400',
            trivial:  'text-gray-600 dark:text-gray-300',
            useful:   'text-emerald-600 dark:text-emerald-400',
        };

        const SHIELD_SVG = '<svg class="w-3.5 h-3.5 inline -mt-0.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3l7 3v6c0 4.5-3.1 8.4-7 9-3.9-.6-7-4.5-7-9V6l7-3z"/><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4"/></svg>';

        // ─── State ─────────────────────────────────────────────────────
        let sessionDetail = null;
        let viewMode = 'coached';   // 'coached' | 'counterfactual'
        let expandedDiffs = new Set();

        // ─── Flag controls (unchanged) ────────────────────────────────
        function renderFlagControls(session) {
            const isFlagged = !!session.flagged_for_support_at;
            const ctl = document.getElementById('flag-controls');
            ctl.innerHTML = isFlagged
                ? `<button id="flag-btn" class="px-3 py-1.5 rounded-lg text-xs font-medium border border-amber-300 dark:border-amber-700/50 bg-amber-50 dark:bg-amber-900/20 text-amber-700 dark:text-amber-300 hover:bg-amber-100 dark:hover:bg-amber-900/40 transition-colors">
                    <svg class="w-3.5 h-3.5 inline -mt-0.5 mr-1" fill="currentColor" viewBox="0 0 24 24"><path d="M14.4 6L14 4H5v17h2v-7h5.6l.4 2h7V6z"/></svg>
                    Withdraw flag
                   </button>`
                : `<button id="flag-btn" class="px-3 py-1.5 rounded-lg text-xs font-medium border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 text-gray-600 dark:text-gray-400 hover:border-amber-400 hover:text-amber-700 dark:hover:text-amber-300 transition-colors">
                    <svg class="w-3.5 h-3.5 inline -mt-0.5 mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M3 21v-4m0 0V5a2 2 0 012-2h6.5l1 2H21l-3 6 3 6h-8.5l-1-2H5a2 2 0 00-2 2zm9-13.5V9"/></svg>
                    Flag for support
                   </button>`;

            document.getElementById('flag-btn').addEventListener('click', async () => {
                const action = isFlagged ? 'unflag' : 'flag';
                let body = null;
                if (action === 'flag') {
                    const note = window.prompt(
                        "Flag this conversation for seer.ai support review.\nWhat's wrong with the analysis? (optional)",
                        ''
                    );
                    if (note === null) return;
                    body = JSON.stringify({ note: note || null });
                }
                const url = `/api/users/${encodeURIComponent(userId)}/sessions/${encodeURIComponent(sessionId)}/${action}`;
                try {
                    const res = await fetch(url, {
                        method: 'POST',
                        headers: body ? { 'Content-Type': 'application/json' } : {},
                        body: body,
                    });
                    if (!res.ok) throw new Error(String(res.status));
                    const updated = await res.json();
                    renderFlagControls(updated);
                    renderFlagBanner(updated);
                } catch (e) {
                    alert('Failed to ' + action + ': ' + e.message);
                }
            });
        }

        function renderFlagBanner(session) {
            const banner = document.getElementById('flag-banner');
            if (!session.flagged_for_support_at) { banner.innerHTML = ''; return; }
            banner.innerHTML = `<div class="rounded-xl border border-amber-300 dark:border-amber-700/50 bg-amber-50 dark:bg-amber-900/20 px-4 py-3 mb-4">
                <div class="text-xs font-semibold text-amber-700 dark:text-amber-400 uppercase tracking-wider mb-1">Flagged for seer.ai support review</div>
                ${session.flag_note ? `<p class="text-sm text-amber-900 dark:text-amber-100">${esc(session.flag_note)}</p>` : '<p class="text-xs text-amber-700 dark:text-amber-300 italic">No note provided.</p>'}
            </div>`;
        }

        // ─── Coach summary (only if session has interventions) ────────
        function renderCoachSummary() {
            const el = document.getElementById('coach-summary');
            const n = sessionDetail.intervention_count || 0;
            if (!n) { el.innerHTML = ''; return; }

            const cats = sessionDetail.intervention_categories || [];
            const catChips = cats.map(c => {
                const s = COACH_STYLES[c] || COACH_STYLES.other;
                return `<span class="inline-flex items-center gap-1.5 px-2 py-0.5 rounded-full text-xs font-medium ${s.bg} ${s.text}">
                    <span class="w-1.5 h-1.5 rounded-full ${s.dot}"></span>${s.label}
                </span>`;
            }).join('');

            const actual = sessionDetail.utility;
            const cf = sessionDetail.counterfactual_utility;
            const delta = (actual && cf && actual !== cf)
                ? `<span class="${UTILITY_TEXT[cf] || ''}">${esc(cf)}</span>
                   <svg class="w-3 h-3 inline -mt-0.5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M14 5l7 7m0 0l-7 7m7-7H3"/></svg>
                   <span class="${UTILITY_TEXT[actual] || ''} font-semibold">${esc(actual)}</span>`
                : '';

            const toggle = sessionDetail.counterfactual_events
                ? `<div class="inline-flex rounded-lg border border-gray-200 dark:border-gray-700 overflow-hidden text-xs" role="tablist">
                     <button data-view="coached" class="view-toggle px-3 py-1.5 font-medium transition-colors">With coach</button>
                     <button data-view="counterfactual" class="view-toggle px-3 py-1.5 font-medium transition-colors border-l border-gray-200 dark:border-gray-700">Without coach</button>
                   </div>`
                : '';

            el.innerHTML = `<div class="rounded-xl border border-gray-200 dark:border-gray-800 bg-white dark:bg-gray-900 px-4 py-3 mb-4">
                <div class="flex items-center justify-between gap-3 flex-wrap">
                    <div class="flex items-center gap-2 flex-wrap">
                        <span class="inline-flex items-center gap-1.5 text-sm font-semibold text-gray-900 dark:text-gray-100">
                            ${SHIELD_SVG} Coach intervened
                            <span class="text-xs font-normal text-gray-500 dark:text-gray-400">${n} turn${n === 1 ? '' : 's'}</span>
                        </span>
                        ${catChips}
                    </div>
                    ${toggle}
                </div>
                ${delta ? `<div class="mt-2 text-xs text-gray-500 dark:text-gray-400">
                    Counterfactual utility: ${delta}
                </div>` : ''}
            </div>`;

            el.querySelectorAll('.view-toggle').forEach(btn => {
                btn.addEventListener('click', () => { viewMode = btn.dataset.view; renderAll(); });
            });
            styleToggle();
        }

        function styleToggle() {
            document.querySelectorAll('.view-toggle').forEach(btn => {
                const active = btn.dataset.view === viewMode;
                btn.className = 'view-toggle px-3 py-1.5 font-medium transition-colors'
                    + (btn.previousElementSibling ? ' border-l border-gray-200 dark:border-gray-700' : '')
                    + (active
                        ? ' bg-gray-900 dark:bg-white text-white dark:text-gray-900'
                        : ' bg-white dark:bg-gray-900 text-gray-600 dark:text-gray-400 hover:text-gray-900 dark:hover:text-gray-100');
            });
        }

        // ─── Event rendering ──────────────────────────────────────────
        function modelProvider(model) {
            if (!model) return null;
            if (model.startsWith('claude')) return 'anthropic';
            if (model.startsWith('gpt') || model.startsWith('o3')) return 'openai';
            if (model.startsWith('gemini')) return 'google';
            if (model.startsWith('mistral')) return 'mistral';
            return null;
        }

        function eventMeta(ev) {
            const time = new Date(ev.timestamp).toLocaleTimeString();
            if (!ev.metadata) return time;
            const parts = [time];
            if (ev.metadata.tokens) parts.push(`${ev.metadata.tokens} tokens`);
            if (ev.metadata.latency_ms) parts.push(`${ev.metadata.latency_ms}ms`);
            return parts.join(' · ');
        }

        function renderUserEvent(ev) {
            return `<div class="self-start max-w-[75%]">
                <div class="text-xs text-gray-400 dark:text-gray-500 mb-0.5">User</div>
                <div class="px-4 py-3 rounded-xl bg-blue-100 dark:bg-blue-900/30 text-gray-800 dark:text-gray-200 whitespace-pre-wrap break-words text-sm leading-relaxed">${esc(ev.content)}</div>
                <div class="text-[0.65rem] text-gray-400 dark:text-gray-500 mt-0.5">${eventMeta(ev)}</div>
            </div>`;
        }

        function renderErrorEvent(ev) {
            return `<div class="self-center max-w-[90%]">
                <div class="text-xs text-gray-400 dark:text-gray-500 mb-0.5">Error</div>
                <div class="px-4 py-3 rounded-xl bg-red-100 dark:bg-red-900/30 text-red-700 dark:text-red-300 whitespace-pre-wrap break-words text-sm leading-relaxed">${esc(ev.content)}</div>
                <div class="text-[0.65rem] text-gray-400 dark:text-gray-500 mt-0.5">${eventMeta(ev)}</div>
            </div>`;
        }

        function renderAIEvent(ev) {
            const md = ev.metadata || {};
            const prov = modelProvider(md.model);
            const label = md.model
                ? `<span class="inline-flex items-center gap-1">${providerIcon(prov)}<span>${esc(md.model)}</span></span>`
                : 'AI';

            const coached = !!md.coached;
            const hasDiff = coached && md.pre_coach_content;
            const diffExpanded = expandedDiffs.has(ev.event_id);

            const shieldHeader = coached
                ? `<span class="ml-1 inline-flex items-center gap-0.5 text-emerald-600 dark:text-emerald-400" title="Coach intervened on this turn">
                     ${SHIELD_SVG}
                   </span>`
                : '';

            const diffToggle = hasDiff
                ? `<button data-toggle-diff="${esc(ev.event_id)}" class="ml-2 text-[0.65rem] font-medium text-emerald-700 dark:text-emerald-400 hover:underline">
                     ${diffExpanded ? 'Hide original' : 'Show original draft'}
                   </button>`
                : '';

            const diffPanel = hasDiff && diffExpanded
                ? `<div class="mt-2 rounded-lg border border-dashed border-gray-300 dark:border-gray-700 bg-gray-50 dark:bg-gray-900/60 px-3 py-2">
                     <div class="text-[0.65rem] uppercase tracking-wider text-gray-500 dark:text-gray-400 mb-1">Original AI draft (not shown to user)</div>
                     <div class="text-xs text-gray-500 dark:text-gray-400 whitespace-pre-wrap break-words leading-relaxed line-through opacity-70">${esc(md.pre_coach_content)}</div>
                   </div>`
                : '';

            return `<div class="self-end max-w-[75%]">
                <div class="text-xs text-gray-400 dark:text-gray-500 mb-0.5 flex items-center justify-end gap-1">
                    ${label}${shieldHeader}
                </div>
                <div class="px-4 py-3 rounded-xl bg-emerald-100 dark:bg-emerald-900/30 text-gray-800 dark:text-gray-200 whitespace-pre-wrap break-words text-sm leading-relaxed">${esc(ev.content)}</div>
                <div class="text-[0.65rem] text-gray-400 dark:text-gray-500 mt-0.5 flex items-center justify-end">
                    <span>${eventMeta(ev)}</span>${diffToggle}
                </div>
                ${diffPanel}
            </div>`;
        }

        function renderCoachEvent(ev) {
            const md = ev.metadata || {};
            const s = COACH_STYLES[md.category] || COACH_STYLES.other;
            const kindLabel = md.kind ? md.kind.replace(/_/g, ' ') : '';
            const modeLabel = md.mode ? ` · ${md.mode}` : '';
            const quoted = md.quoted_span
                ? `<div class="mt-2 text-xs ${s.text} opacity-80">
                     <span class="font-mono bg-white/60 dark:bg-black/30 px-1.5 py-0.5 rounded">${esc(md.quoted_span)}</span>
                   </div>`
                : '';
            const sources = (md.sources && md.sources.length)
                ? `<div class="mt-2 flex items-center gap-1.5 flex-wrap text-[0.7rem]">
                     <span class="text-gray-500 dark:text-gray-400">Sources:</span>
                     ${md.sources.map(u => `<a href="${esc(u)}" target="_blank" rel="noopener" class="text-blue-600 dark:text-blue-400 hover:underline break-all">${esc(u.replace(/^https?:\/\//, ''))}</a>`).join('<span class="text-gray-300 dark:text-gray-600">·</span>')}
                   </div>`
                : '';
            const savings = md.estimated_savings_cents
                ? `<span class="text-[0.7rem] text-gray-500 dark:text-gray-400">est. $${(md.estimated_savings_cents/100).toFixed(2)} saved</span>`
                : '';
            const accepted = md.accepted === true
                ? `<span class="text-[0.7rem] font-medium text-emerald-700 dark:text-emerald-400">Accepted</span>`
                : md.accepted === false
                ? `<span class="text-[0.7rem] font-medium text-gray-500 dark:text-gray-400">Ignored</span>`
                : '';

            return `<div class="self-center max-w-[90%] w-full">
                <div class="rounded-xl border ${s.border} ${s.bg} px-4 py-3">
                    <div class="flex items-center justify-between gap-2 mb-1.5">
                        <div class="flex items-center gap-1.5 text-xs font-semibold ${s.text}">
                            ${SHIELD_SVG}
                            <span>Coach · ${s.label}</span>
                            <span class="font-normal opacity-80">${esc(kindLabel)}${modeLabel}</span>
                        </div>
                        <div class="flex items-center gap-2">${accepted}${savings}</div>
                    </div>
                    <div class="text-sm text-gray-800 dark:text-gray-200 whitespace-pre-wrap break-words leading-relaxed">${esc(ev.content)}</div>
                    ${quoted}
                    ${sources}
                </div>
                <div class="text-[0.65rem] text-gray-400 dark:text-gray-500 mt-0.5 text-center">${eventMeta(ev)}</div>
            </div>`;
        }

        function renderEvent(ev) {
            switch (ev.event_type) {
                case 'user_message': return renderUserEvent(ev);
                case 'ai_message':   return renderAIEvent(ev);
                case 'error':        return renderErrorEvent(ev);
                case 'coach_intervention': return renderCoachEvent(ev);
                default: return '';
            }
        }

        function currentEvents() {
            if (viewMode === 'counterfactual' && sessionDetail.counterfactual_events) {
                return sessionDetail.counterfactual_events;
            }
            return sessionDetail.events;
        }

        function renderEvents() {
            const el = document.getElementById('content');
            const events = currentEvents();
            if (!events || !events.length) {
                el.innerHTML = '<p class="text-gray-400 text-center py-8">No events in this session.</p>';
                return;
            }
            let html = '<div class="flex flex-col gap-3">';
            if (viewMode === 'counterfactual') {
                html += `<div class="self-center max-w-[90%] w-full text-center">
                    <div class="inline-flex items-center gap-1.5 text-[0.7rem] uppercase tracking-wider text-amber-700 dark:text-amber-400 bg-amber-50 dark:bg-amber-900/20 border border-amber-200 dark:border-amber-800/50 rounded-full px-3 py-1">
                        Counterfactual — what the user would have seen without coach
                    </div>
                </div>`;
            }
            for (const ev of events) html += renderEvent(ev);
            html += '</div>';
            el.innerHTML = html;

            el.querySelectorAll('[data-toggle-diff]').forEach(btn => {
                btn.addEventListener('click', () => {
                    const id = btn.dataset.toggleDiff;
                    if (expandedDiffs.has(id)) expandedDiffs.delete(id);
                    else expandedDiffs.add(id);
                    renderEvents();
                });
            });
        }

        function renderAll() {
            renderFlagControls(sessionDetail);
            renderFlagBanner(sessionDetail);
            renderCoachSummary();
            renderEvents();
        }

        fetch(`/api/users/${encodeURIComponent(userId)}/sessions/${encodeURIComponent(sessionId)}`)
            .then(r => { if (!r.ok) throw new Error(`${r.status}`); return r.json(); })
            .then(session => { sessionDetail = session; renderAll(); })
            .catch(e => {
                document.getElementById('content').innerHTML = '<p class="text-red-400 text-center py-8">Error: ' + esc(e.message) + '</p>';
            });

        function esc(s) { const d = document.createElement('div'); d.textContent = s == null ? '' : String(s); return d.innerHTML; }

        (function waitBadge() {
            if (!window.seerai || !window.seerai.ready) { setTimeout(waitBadge, 50); return; }
            window.seerai.ready.then(function () {
                const company = window.seerai.getUserCompany(userId);
                if (company) {
                    document.getElementById('company-badge').innerHTML =
                        window.seerai.companyBadge(company, { showName: false })
                        + '<span class="mx-1">/</span>';
                }
            });
        })();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>seerai — conversation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
    <script>if (localStorage.getItem('seerai_theme') === 'dark' || (!localStorage.getItem('seerai_theme') && matchMedia('(prefers-color-scheme:dark)').matches)) document.documentElement.classList.add('dark');</script>
    <script src="/static/icons.js"></script>
    <script src="/static/nav.js" defer></script>
</head>
<body class="bg-gray-50 dark:bg-gray-950 text-gray-800 dark:text-gray-200 min-h-screen">
    <div class="max-w-4xl mx-auto px-4 py-8">
        <div class="flex items-start justify-between gap-3 mb-6">
            <p class="text-sm text-gray-500 dark:text-gray-400">
                <a href="/" class="text-blue-600 dark:text-blue-400 hover:underline">seerai</a>
                <span class="mx-1">/</span>
                <span id="company-badge"></span>
                <a href="" id="user-link" class="text-blue-600 dark:text-blue-400 hover:underline"><span id="uid"></span></a>
                <span class="mx-1">/</span>
                <span id="sid" class="text-gray-700 dark:text-gray-300"></span>
            </p>
            <div id="flag-controls" class="shrink-0"></div>
        </div>
        <div id="flag-banner"></div>
        <div id="content"><p class="text-gray-400 text-center py-8">Loading...</p></div>
    </div>
    <script>
        const parts = window.location.pathname.split('/');
        const userId = decodeURIComponent(parts[2]);
        const sessionId = decodeURIComponent(parts[3]);
        document.getElementById('uid').textContent = userId;
        document.getElementById('sid').textContent = sessionId.length > 24 ? sessionId.slice(0, 24) + '...' : sessionId;
        document.getElementById('user-link').href = `/sessions/${encodeURIComponent(userId)}`;

        function renderFlagControls(session) {
            const isFlagged = !!session.flagged_for_support_at;
            const ctl = document.getElementById('flag-controls');
            ctl.innerHTML = isFlagged
                ? `<button id="flag-btn" class="px-3 py-1.5 rounded-lg text-xs font-medium border border-amber-300 dark:border-amber-700/50 bg-amber-50 dark:bg-amber-900/20 text-amber-700 dark:text-amber-300 hover:bg-amber-100 dark:hover:bg-amber-900/40 transition-colors">
                    <svg class="w-3.5 h-3.5 inline -mt-0.5 mr-1" fill="currentColor" viewBox="0 0 24 24"><path d="M14.4 6L14 4H5v17h2v-7h5.6l.4 2h7V6z"/></svg>
                    Withdraw flag
                   </button>`
                : `<button id="flag-btn" class="px-3 py-1.5 rounded-lg text-xs font-medium border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 text-gray-600 dark:text-gray-400 hover:border-amber-400 hover:text-amber-700 dark:hover:text-amber-300 transition-colors">
                    <svg class="w-3.5 h-3.5 inline -mt-0.5 mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M3 21v-4m0 0V5a2 2 0 012-2h6.5l1 2H21l-3 6 3 6h-8.5l-1-2H5a2 2 0 00-2 2zm9-13.5V9"/></svg>
                    Flag for support
                   </button>`;

            document.getElementById('flag-btn').addEventListener('click', async () => {
                const action = isFlagged ? 'unflag' : 'flag';
                let body = null;
                if (action === 'flag') {
                    const note = window.prompt(
                        "Flag this conversation for seer.ai support review.\nWhat's wrong with the analysis? (optional)",
                        ''
                    );
                    if (note === null) return;
                    body = JSON.stringify({ note: note || null });
                }
                const url = `/api/users/${encodeURIComponent(userId)}/sessions/${encodeURIComponent(sessionId)}/${action}`;
                try {
                    const res = await fetch(url, {
                        method: 'POST',
                        headers: body ? { 'Content-Type': 'application/json' } : {},
                        body: body,
                    });
                    if (!res.ok) throw new Error(String(res.status));
                    const updated = await res.json();
                    renderFlagControls(updated);
                    renderFlagBanner(updated);
                } catch (e) {
                    alert('Failed to ' + action + ': ' + e.message);
                }
            });
        }

        function renderFlagBanner(session) {
            const banner = document.getElementById('flag-banner');
            if (!session.flagged_for_support_at) {
                banner.innerHTML = '';
                return;
            }
            banner.innerHTML = `<div class="rounded-xl border border-amber-300 dark:border-amber-700/50 bg-amber-50 dark:bg-amber-900/20 px-4 py-3 mb-4">
                <div class="text-xs font-semibold text-amber-700 dark:text-amber-400 uppercase tracking-wider mb-1">Flagged for seer.ai support review</div>
                ${session.flag_note ? `<p class="text-sm text-amber-900 dark:text-amber-100">${esc(session.flag_note)}</p>` : '<p class="text-xs text-amber-700 dark:text-amber-300 italic">No note provided.</p>'}
            </div>`;
        }

        fetch(`/api/users/${encodeURIComponent(userId)}/sessions/${encodeURIComponent(sessionId)}`)
            .then(r => { if (!r.ok) throw new Error(`${r.status}`); return r.json(); })
            .then(session => {
                renderFlagControls(session);
                renderFlagBanner(session);
                const el = document.getElementById('content');
                if (!session.events.length) {
                    el.innerHTML = '<p class="text-gray-400 text-center py-8">No events in this session.</p>';
                    return;
                }
                let html = '<div class="flex flex-col gap-3">';
                for (const ev of session.events) {
                    const isUser = ev.event_type === 'user_message';
                    const isError = ev.event_type === 'error';
                    const isAI = ev.event_type === 'ai_message';
                    const align = isError ? 'self-center' : isUser ? 'self-start' : 'self-end';
                    const bg = isError
                        ? 'bg-red-100 dark:bg-red-900/30 text-red-700 dark:text-red-300'
                        : isUser
                        ? 'bg-blue-100 dark:bg-blue-900/30 text-gray-800 dark:text-gray-200'
                        : 'bg-emerald-100 dark:bg-emerald-900/30 text-gray-800 dark:text-gray-200';
                    const time = new Date(ev.timestamp).toLocaleTimeString();

                    // Label with provider icon for AI messages
                    let label;
                    if (isAI && ev.metadata && ev.metadata.model) {
                        const modelProvider = ev.metadata.model.startsWith('claude') ? 'anthropic'
                            : ev.metadata.model.startsWith('gpt') || ev.metadata.model.startsWith('o3') ? 'openai'
                            : ev.metadata.model.startsWith('gemini') ? 'google'
                            : ev.metadata.model.startsWith('mistral') ? 'mistral' : null;
                        label = `<span class="inline-flex items-center gap-1">${providerIcon(modelProvider)}<span>${esc(ev.metadata.model)}</span></span>`;
                    } else {
                        label = isUser ? 'User' : isError ? 'Error' : 'AI';
                    }

                    // Metadata line
                    let meta = time;
                    if (ev.metadata) {
                        const show = [];
                        if (ev.metadata.tokens) show.push(`${ev.metadata.tokens} tokens`);
                        if (ev.metadata.latency_ms) show.push(`${ev.metadata.latency_ms}ms`);
                        if (show.length) meta += ' &middot; ' + show.join(' &middot; ');
                    }

                    const maxW = isError ? 'max-w-[90%]' : 'max-w-[75%]';
                    html += `<div class="${align} ${maxW}">
                        <div class="text-xs text-gray-400 dark:text-gray-500 mb-0.5">${label}</div>
                        <div class="px-4 py-3 rounded-xl ${bg} whitespace-pre-wrap break-words text-sm leading-relaxed">${esc(ev.content)}</div>
                        <div class="text-[0.65rem] text-gray-400 dark:text-gray-500 mt-0.5">${meta}</div>
                    </div>`;
                }
                html += '</div>';
                el.innerHTML = html;
            })
            .catch(e => {
                document.getElementById('content').innerHTML = '<p class="text-red-400 text-center py-8">Error: ' + e.message + '</p>';
            });

        function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

        (function waitBadge() {
            if (!window.seerai || !window.seerai.ready) { setTimeout(waitBadge, 50); return; }
            window.seerai.ready.then(function () {
                const company = window.seerai.getUserCompany(userId);
                if (company) {
                    document.getElementById('company-badge').innerHTML =
                        window.seerai.companyBadge(company, { showName: false })
                        + '<span class="mx-1">/</span>';
                }
            });
        })();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>seerai — org detail</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
    <script>if (localStorage.getItem('seerai_theme') === 'dark' || (!localStorage.getItem('seerai_theme') && matchMedia('(prefers-color-scheme:dark)').matches)) document.documentElement.classList.add('dark');</script>
    <script src="/static/icons.js"></script>
    <script src="/static/tooltips.js"></script>
    <script src="/static/nav.js" defer></script>
</head>
<body class="bg-gray-50 dark:bg-gray-950 text-gray-800 dark:text-gray-200 min-h-screen">
    <div class="max-w-4xl mx-auto px-4 py-8">
        <p class="text-sm text-gray-500 dark:text-gray-400 mb-1" id="breadcrumb">
            <a href="/" class="text-blue-600 dark:text-blue-400 hover:underline">seerai</a>
            <span class="mx-1">/</span>
            <a href="/exec" class="text-blue-600 dark:text-blue-400 hover:underline">orgs</a>
        </p>
        <h1 id="title" class="text-2xl font-bold text-gray-900 dark:text-white mb-6">Loading...</h1>
        <div id="content"><p class="text-gray-400 text-center py-8">Loading...</p></div>
    </div>
    <script>
        const orgId = decodeURIComponent(window.location.pathname.split('/')[2]);

        Promise.all([
            fetch(`/api/orgs/${encodeURIComponent(orgId)}/tree`).then(r => { if (!r.ok) throw new Error(`${r.status}`); return r.json(); }),
            fetch(`/api/orgs/${encodeURIComponent(orgId)}`).then(r => r.json()),
            fetch(`/api/cost/org/${encodeURIComponent(orgId)}`).then(r => r.ok ? r.json() : null),
            fetch(`/api/insights?org_id=${encodeURIComponent(orgId)}`).then(r => r.ok ? r.json() : []),
            fetch(`/api/coach/summary?org_id=${encodeURIComponent(orgId)}`).then(r => r.ok ? r.json() : null),
        ])
        .then(([tree, orgNode, costData, insightsData, coachData]) => {
            // Index insights by user and org
            const insightsByUser = {};
            const insightsByOrg = {};
            for (const ins of insightsData) {
                (insightsByUser[ins.user_id] = insightsByUser[ins.user_id] || []).push(ins);
                (insightsByOrg[ins.org_id] = insightsByOrg[ins.org_id] || []).push(ins);
            }
            document.getElementById('title').textContent = orgNode.name;

            // Breadcrumb with company badge
            const rootOrgId = orgNode.path[0];
            const companyBadge = (window.seerai && window.seerai.companyBadge) ? window.seerai.companyBadge(rootOrgId, { showName: false }) : '';
            let bc = '<a href="/" class="text-blue-600 dark:text-blue-400 hover:underline">seerai</a><span class="mx-1">/</span>'
                + (companyBadge ? companyBadge + '<span class="mx-1">/</span>' : '')
                + '<a href="/exec" class="text-blue-600 dark:text-blue-400 hover:underline">orgs</a>';
            for (let i = 0; i < orgNode.path.length; i++) {
                const pid = orgNode.path[i];
                bc += '<span class="mx-1">/</span>';
                if (pid === orgId) {
                    bc += `<span class="text-gray-700 dark:text-gray-300">${esc(orgNode.name)}</span>`;
                } else {
                    bc += `<a href="/exec/${encodeURIComponent(pid)}" class="text-blue-600 dark:text-blue-400 hover:underline">${esc(pid)}</a>`;
                }
            }
            document.getElementById('breadcrumb').innerHTML = bc;

            const n = tree.node;
            const errRate = n.message_count > 0 ? ((n.error_count / n.message_count) * 100).toFixed(1) + '%' : '—';

            // Activity cards
            let html = `<div class="grid grid-cols-2 sm:grid-cols-4 gap-3 mb-4">
                <div class="rounded-xl border border-gray-200 dark:border-gray-700/60 p-4 bg-white dark:bg-gray-900">
                    <div class="text-2xl font-bold text-gray-900 dark:text-white">${n.user_count}</div>
                    <div class="text-xs text-gray-400 mt-0.5">Users</div>
                </div>
                <div class="rounded-xl border border-gray-200 dark:border-gray-700/60 p-4 bg-white dark:bg-gray-900">
                    <div class="text-2xl font-bold text-gray-900 dark:text-white">${n.session_count}</div>
                    <div class="text-xs text-gray-400 mt-0.5">Sessions</div>
                </div>
                <div class="rounded-xl border border-gray-200 dark:border-gray-700/60 p-4 bg-white dark:bg-gray-900">
                    <div class="text-2xl font-bold text-gray-900 dark:text-white">${n.message_count}</div>
                    <div class="text-xs text-gray-400 mt-0.5">Messages</div>
                </div>
                <div class="rounded-xl border border-gray-200 dark:border-gray-700/60 p-4 bg-white dark:bg-gray-900">
                    <div class="text-2xl font-bold ${n.error_count > 0 ? 'text-red-500' : 'text-gray-900 dark:text-white'}">${errRate}</div>
                    <div class="text-xs text-gray-400 mt-0.5">Error Rate</div>
                </div>
            </div>`;

            // Cost/ROI cards
            if (costData) {
                const eff = costData.efficiency_ratio;
                const effColor = eff === null ? 'text-gray-400' : eff >= 1 ? 'text-emerald-500' : 'text-amber-500';
                const effLabel = eff === null ? '—' : eff.toFixed(2) + 'x';
                const roi = costData.roi;
                const roiColor = roi === null ? 'text-gray-400' : roi >= 1 ? 'text-emerald-500' : 'text-amber-500';
                const roiLabel = roi === null ? '—' : roi.toFixed(1) + 'x';

                html += `<div class="grid grid-cols-2 sm:grid-cols-4 gap-3 mb-8">
                    <div class="rounded-xl border border-gray-200 dark:border-gray-700/60 p-4 bg-white dark:bg-gray-900">
                        <div class="text-2xl font-bold text-gray-900 dark:text-white">$${costData.total_monthly_subscription.toFixed(0)}</div>
                        <div class="text-xs text-gray-400 mt-0.5">Subscriptions / mo</div>
                    </div>
                    <div data-metric="value" class="rounded-xl border border-gray-200 dark:border-gray-700/60 p-4 bg-white dark:bg-gray-900">
                        <div class="text-2xl font-bold text-gray-900 dark:text-white">$${costData.total_estimated_value.toFixed(0)}</div>
                        <div class="text-xs text-gray-400 mt-0.5">Value / mo</div>
                    </div>
                    <div data-metric="efficiency" class="rounded-xl border border-gray-200 dark:border-gray-700/60 p-4 bg-white dark:bg-gray-900">
                        <div class="text-2xl font-bold ${effColor}">${effLabel}</div>
                        <div class="text-xs text-gray-400 mt-0.5">Cost Efficiency</div>
                    </div>
                    <div data-metric="roi" class="rounded-xl border border-gray-200 dark:border-gray-700/60 p-4 bg-white dark:bg-gray-900">
                        <div class="text-2xl font-bold ${roiColor}">${roiLabel}</div>
                        <div class="text-xs text-gray-400 mt-0.5">ROI</div>
                    </div>
                </div>`;
            } else {
                html += '<div class="mb-8"></div>';
            }

            // Coach impact strip — compact, only when coach has fired in this org.
            if (coachData && coachData.interventions_total > 0) {
                html += renderCoachStrip(orgId, coachData);
            }

            // Index cost data by user_id for lookup. `users` is null when the
            // current org is small-cohort suppressed; treat as empty.
            const userCostMap = {};
            if (costData && Array.isArray(costData.users)) {
                for (const uc of costData.users) userCostMap[uc.user_id] = uc;
            }

            // Children — fetch cost per child org in parallel
            const childCostPromise = tree.children.length
                ? Promise.all(tree.children.map(ch =>
                    fetch(`/api/cost/org/${encodeURIComponent(ch.node.org_id)}`)
                        .then(r => r.ok ? r.json() : null)
                        .catch(() => null)
                  ))
                : Promise.resolve([]);

            return childCostPromise.then(childCosts => {
                if (tree.children.length) {
                    html += '<h2 class="text-sm font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider mb-3">Sub-organizations</h2>';
                    html += `<div class="rounded-xl border border-gray-200 dark:border-gray-700/60 overflow-hidden mb-8">
                        <div class="overflow-x-auto">
                        <table class="w-full text-sm">
                        <thead><tr class="bg-gray-100 dark:bg-gray-800/60">
                            <th class="text-left px-4 py-2.5 font-medium text-gray-500 dark:text-gray-400">Name</th>
                            <th class="text-right px-4 py-2.5 font-medium text-gray-500 dark:text-gray-400" title="Users with ≥1 session in last 30d / total users">Adoption</th>
                            <th class="text-right px-4 py-2.5 font-medium text-gray-500 dark:text-gray-400">Sessions</th>
                            <th class="text-right px-4 py-2.5 font-medium text-gray-500 dark:text-gray-400" title="Per active user · total in parens">Sub $/user</th>
                            <th class="text-right px-4 py-2.5 font-medium text-gray-500 dark:text-gray-400" title="Per active user · total in parens">Value/user</th>
                            <th class="text-right px-4 py-2.5 font-medium text-gray-500 dark:text-gray-400">ROI</th>
                        </tr></thead><tbody class="divide-y divide-gray-100 dark:divide-gray-800">`;
                    for (let i = 0; i < tree.children.length; i++) {
                        const c = tree.children[i].node;
                        const cc = childCosts[i];
                        // A "suppressed" cost row (small-cohort under privacy mode)
                        // keeps user_count + identifiers but nulls everything else,
                        // including the `users` array. Render a single muted row
                        // for those, no metrics.
                        const suppressed = !!(cc && cc.suppressed);
                        const usersArr = cc && Array.isArray(cc.users) ? cc.users : [];
                        const activeUsers = usersArr.filter(u => u.session_count > 0).length;
                        const totalUsers = cc ? cc.user_count : c.user_count;
                        const adoptionRate = totalUsers > 0 ? Math.round(activeUsers / totalUsers * 100) : 0;
                        const adoptionColor = adoptionRate >= 75 ? 'text-emerald-500'
                            : adoptionRate >= 40 ? 'text-gray-600 dark:text-gray-400'
                            : adoptionRate > 0 ? 'text-amber-500'
                            : 'text-gray-400';
                        const orgInsCount = (insightsByOrg[c.org_id] || []).length;

                        if (suppressed) {
                            html += `<tr class="hover:bg-gray-50 dark:hover:bg-gray-800/40 transition-colors">
                                <td class="px-4 py-2.5"><a href="/exec/${encodeURIComponent(c.org_id)}" class="text-blue-600 dark:text-blue-400 hover:underline">${esc(c.name)}</a>${insightBadge(orgInsCount, {org_id: c.org_id})}</td>
                                <td class="px-4 py-2.5 text-right text-[0.7rem] text-gray-400 italic" colspan="5" title="Cohort below ${totalUsers}-user privacy threshold — metrics suppressed">cohort &lt; threshold · suppressed</td>
                            </tr>`;
                            continue;
                        }

                        const adoptionCell = cc
                            ? `<span class="${adoptionColor} font-medium tabular-nums">${adoptionRate}%</span><div class="text-[0.65rem] text-gray-400">${activeUsers}/${totalUsers}</div>`
                            : '<span class="text-gray-400">—</span>';
                        const denom = activeUsers || totalUsers || 0;
                        const subPerUserStr = cc && denom > 0 ? '$' + (cc.total_monthly_subscription / denom).toFixed(0) : '—';
                        const valPerUserStr = cc && denom > 0 ? '$' + (cc.total_estimated_value / denom).toFixed(0) : '—';
                        const subTotalStr = cc ? '$' + cc.total_monthly_subscription.toFixed(0) : '—';
                        const valTotalStr = cc ? '$' + cc.total_estimated_value.toFixed(0) : '—';
                        const cRoi = cc ? cc.roi : null;
                        const cRoiColor = cRoi === null ? 'text-gray-400' : cRoi >= 1 ? 'text-emerald-500' : 'text-amber-500';
                        const cRoiLabel = cRoi === null ? '—' : cRoi.toFixed(1) + 'x';
                        html += `<tr class="hover:bg-gray-50 dark:hover:bg-gray-800/40 transition-colors">
                            <td class="px-4 py-2.5"><a href="/exec/${encodeURIComponent(c.org_id)}" class="text-blue-600 dark:text-blue-400 hover:underline">${esc(c.name)}</a>${insightBadge(orgInsCount, {org_id: c.org_id})}</td>
                            <td class="px-4 py-2.5 text-right">${adoptionCell}</td>
                            <td class="px-4 py-2.5 text-right text-gray-600 dark:text-gray-400">${c.session_count}</td>
                            <td class="px-4 py-2.5 text-right text-gray-600 dark:text-gray-400 tabular-nums">${subPerUserStr}<div class="text-[0.65rem] text-gray-400">${subTotalStr} total</div></td>
                            <td class="px-4 py-2.5 text-right text-gray-600 dark:text-gray-400 tabular-nums">${valPerUserStr}<div class="text-[0.65rem] text-gray-400">${valTotalStr} total</div></td>
                            <td class="px-4 py-2.5 text-right font-medium ${cRoiColor}">${cRoiLabel}</td>
                        </tr>`;
                    }
                    html += '</tbody></table></div></div>';
                }

                // Users
                return fetch(`/api/orgs/${encodeURIComponent(orgId)}/users`)
                    .then(r => r.json())
                    .then(users => {
                        if (users.length) {
                            html += '<h2 class="text-sm font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider mb-3">Users</h2>';
                            html += `<div class="rounded-xl border border-gray-200 dark:border-gray-700/60 overflow-hidden">
                                <div class="overflow-x-auto">
                                <table class="w-full text-sm">
                                <thead><tr class="bg-gray-100 dark:bg-gray-800/60">
                                    <th class="text-left px-4 py-2.5 font-medium text-gray-500 dark:text-gray-400">User</th>
                                    <th class="text-right px-4 py-2.5 font-medium text-gray-500 dark:text-gray-400">Sub $/mo</th>
                                    <th class="text-right px-4 py-2.5 font-medium text-gray-500 dark:text-gray-400">Value / mo</th>
                                    <th class="text-right px-4 py-2.5 font-medium text-gray-500 dark:text-gray-400">ROI</th>
                                    <th class="text-left px-4 py-2.5 font-medium text-gray-500 dark:text-gray-400">Utility</th>
                                    <th class="text-left px-4 py-2.5 font-medium text-gray-500 dark:text-gray-400">Last Active</th>
                                </tr></thead><tbody class="divide-y divide-gray-100 dark:divide-gray-800">`;
                            for (const u of users) {
                                const t = new Date(u.last_active).toLocaleString();
                                const uc = userCostMap[u.user_id];
                                const uSub = uc ? '$' + uc.monthly_subscription.toFixed(0) : '—';
                                const uVal = uc ? '$' + uc.estimated_value.toFixed(0) : '—';
                                const uRoi = uc ? uc.roi : null;
                                const uRoiColor = uRoi === null ? 'text-gray-400' : uRoi >= 1 ? 'text-emerald-500' : 'text-amber-500';
                                const uRoiLabel = uRoi === null ? '—' : uRoi.toFixed(1) + 'x';
                                const utilBar = uc ? miniBar(uc.utility_breakdown) : '<span class="text-gray-400 text-xs">—</span>';
                                const uInsCount = (insightsByUser[u.user_id] || []).length;
                                html += `<tr class="hover:bg-gray-50 dark:hover:bg-gray-800/40 transition-colors">
                                    <td class="px-4 py-2.5"><a href="/sessions/${encodeURIComponent(u.user_id)}" class="text-blue-600 dark:text-blue-400 hover:underline">${esc(u.user_id)}</a>${insightBadge(uInsCount, {user_id: u.user_id})}</td>
                                    <td class="px-4 py-2.5 text-right text-gray-600 dark:text-gray-400">${uSub}</td>
                                    <td class="px-4 py-2.5 text-right text-gray-600 dark:text-gray-400">${uVal}</td>
                                    <td class="px-4 py-2.5 text-right font-medium ${uRoiColor}">${uRoiLabel}</td>
                                    <td class="px-4 py-2.5">${utilBar}</td>
                                    <td class="px-4 py-2.5 text-gray-500 dark:text-gray-400 text-xs">${t}</td>
                                </tr>`;
                            }
                            html += '</tbody></table></div></div>';
                        } else if (!tree.children.length) {
                            html += '<p class="text-gray-400 text-center py-8">No sub-organizations or users.</p>';
                        }
                        document.getElementById('content').innerHTML = html;
                        if (costData) {
                            attachMetricTooltips({
                                efficiency_ratio: costData.efficiency_ratio,
                                estimated_value: costData.total_estimated_value,
                                subscription: costData.total_monthly_subscription,
                                roi: costData.roi,
                            });
                        }
                    });
            });
        })
        .catch(e => {
            document.getElementById('content').innerHTML = '<p class="text-red-400 text-center py-8">Error: ' + e.message + '</p>';
        });

        function miniBar(ub) {
            const harmful = ub.harmful || 0;
            const total = ub.non_work + ub.trivial + ub.useful + harmful + (ub.unclassified || 0);
            if (total === 0) return '<span class="text-gray-400 text-xs">—</span>';
            const w = (n) => Math.round(n / total * 100);
            const title = ub.useful + ' useful, ' + ub.trivial + ' trivial, ' + ub.non_work + ' non-work' +
                (harmful ? ', ' + harmful + ' harmful (QA-flagged)' : '');
            let bar = '<div class="flex h-2 w-20 rounded-full overflow-hidden bg-gray-200 dark:bg-gray-700" title="' + title + '">';
            if (ub.useful) bar += `<div class="bg-emerald-500" style="width:${w(ub.useful)}%"></div>`;
            if (ub.trivial) bar += `<div class="bg-blue-400" style="width:${w(ub.trivial)}%"></div>`;
            if (ub.non_work) bar += `<div class="bg-gray-400" style="width:${w(ub.non_work)}%"></div>`;
            if (harmful) bar += `<div class="bg-red-500" style="width:${w(harmful)}%"></div>`;
            bar += '</div>';
            return bar;
        }

        function insightBadge(count, params) {
            if (!count) return '';
            var qs = new URLSearchParams(params || {}).toString();
            var href = '/exec/insights' + (qs ? '?' + qs : '');
            return ' <a href="' + href + '" class="inline-flex items-center gap-0.5 px-1.5 py-0.5 rounded-full text-[0.6rem] font-semibold bg-violet-100 text-violet-700 dark:bg-violet-900/40 dark:text-violet-300 hover:bg-violet-200 dark:hover:bg-violet-800/50 transition-colors" title="' + count + ' insight' + (count > 1 ? 's' : '') + '">'
                + '<svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/></svg>'
                + count + '</a>';
        }

        const COACH_CAT_STYLES = {
            factuality: { label: 'Factuality', dot: 'bg-rose-500' },
            efficiency: { label: 'Efficiency', dot: 'bg-sky-500' },
            sources:    { label: 'Sources',    dot: 'bg-violet-500' },
            other:      { label: 'Other',      dot: 'bg-amber-500' },
        };

        function fmtMoneyShort(cents) {
            const d = (cents || 0) / 100;
            const sign = d < 0 ? '-' : '';
            const a = Math.abs(d);
            return a >= 1000 ? sign + '$' + (a / 1000).toFixed(1) + 'k' : sign + '$' + a.toFixed(0);
        }

        function renderCoachStrip(orgId, s) {
            const catChips = (s.by_category || []).map(c => {
                const st = COACH_CAT_STYLES[c.category] || COACH_CAT_STYLES.other;
                return `<span class="inline-flex items-center gap-1 text-xs text-gray-600 dark:text-gray-400">
                    <span class="w-1.5 h-1.5 rounded-full ${st.dot}"></span>${st.label} <span class="text-gray-400">${c.interventions}</span>
                </span>`;
            }).join('<span class="mx-1.5 text-gray-300 dark:text-gray-700">·</span>');

            const delta = s.value_cents ? s.value_cents.delta : 0;
            const turnsSaved = s.turns ? s.turns.delta : 0;
            const deltaSign = delta > 0 ? '+' : '';

            return `<div class="rounded-xl border border-emerald-200 dark:border-emerald-800/40 bg-emerald-50/50 dark:bg-emerald-900/10 p-4 mb-8">
                <div class="flex items-center justify-between gap-3 flex-wrap">
                    <div class="flex items-center gap-3 flex-wrap">
                        <span class="inline-flex items-center gap-1.5 text-sm font-semibold text-emerald-700 dark:text-emerald-300">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3l7 3v6c0 4.5-3.1 8.4-7 9-3.9-.6-7-4.5-7-9V6l7-3z"/><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4"/></svg>
                            Coach
                        </span>
                        <span class="text-sm text-gray-700 dark:text-gray-200">
                            <span class="font-semibold">${s.interventions_total}</span>
                            <span class="text-gray-500 dark:text-gray-400">interventions across ${s.coached_sessions} sessions</span>
                        </span>
                        ${catChips ? '<span class="text-gray-300 dark:text-gray-700">·</span>' + catChips : ''}
                    </div>
                    <div class="flex items-center gap-4">
                        <div class="text-right">
                            <div class="text-xs text-gray-500 dark:text-gray-400">Value Δ</div>
                            <div class="text-sm font-bold ${delta > 0 ? 'text-emerald-600 dark:text-emerald-400' : 'text-gray-500'}">${deltaSign}${fmtMoneyShort(delta)}</div>
                        </div>
                        <div class="text-right">
                            <div class="text-xs text-gray-500 dark:text-gray-400">Turns saved</div>
                            <div class="text-sm font-bold text-gray-900 dark:text-white">${turnsSaved}</div>
                        </div>
                        <a href="/exec/coach?org_id=${encodeURIComponent(orgId)}"
                           class="text-xs font-medium text-emerald-700 dark:text-emerald-400 hover:underline whitespace-nowrap">
                            Open →
                        </a>
                    </div>
                </div>
            </div>`;
        }

        function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>seerai — sessions</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
    <script>if (localStorage.getItem('seerai_theme') === 'dark' || (!localStorage.getItem('seerai_theme') && matchMedia('(prefers-color-scheme:dark)').matches)) document.documentElement.classList.add('dark');</script>
    <script src="/static/icons.js"></script>
    <script src="/static/calendar.js"></script>
    <script src="/static/tooltips.js"></script>
    <script src="/static/nav.js" defer></script>
</head>
<body class="bg-gray-50 dark:bg-gray-950 text-gray-800 dark:text-gray-200 min-h-screen">
    <div class="max-w-5xl mx-auto px-4 py-8">
        <p class="text-sm text-gray-500 dark:text-gray-400 mb-1">
            <a href="/" class="text-blue-600 dark:text-blue-400 hover:underline">seerai</a>
            <span class="mx-1">/</span>
            <span id="company-badge"></span>
            <span id="uid" class="text-gray-700 dark:text-gray-300"></span>
        </p>
        <h1 class="text-2xl font-bold text-gray-900 dark:text-white mb-6">Sessions</h1>
        <div id="cost-cards"></div>
        <div id="activity" class="mb-6"></div>
        <div id="content"><p class="text-gray-400 text-center py-8">Loading...</p></div>
    </div>
    <script>
        const parts = window.location.pathname.split('/');
        const userId = decodeURIComponent(parts[2]);
        document.getElementById('uid').textContent = userId;

        // Mirrors seerai.cost.endpoint: positive factors are discounted by 0.5
        // (saved time ≠ 1:1 fungible), negative factors aren't (cleanup time
        // is real wall-clock time). Harmful produces genuinely negative value.
        const UTILITY_HOURS = { non_work: 0, trivial: 0.05, useful: 0.25, harmful: -0.30 };
        const DISPLACEMENT = 0.5;
        function sessionValue(rate, eventCount, utility) {
            const factor = UTILITY_HOURS[utility];
            if (factor == null || factor === 0 || eventCount < 1) return 0;
            const raw = rate * Math.log2(Math.max(eventCount, 1)) * factor;
            return factor > 0 ? raw * DISPLACEMENT : raw;
        }

        // Order and display config for the utility filter pills. Kept in one
        // place so the pills, badges, and sort-by-utility logic stay aligned.
        const UTILITY_FILTERS = [
            { key: 'all',          label: 'All' },
            { key: 'useful',       label: 'Useful',       dot: 'bg-emerald-500' },
            { key: 'trivial',      label: 'Trivial',      dot: 'bg-blue-400' },
            { key: 'non_work',     label: 'Non-work',     dot: 'bg-gray-400' },
            { key: 'harmful',      label: 'Harmful',      dot: 'bg-red-500' },
            { key: 'unclassified', label: 'Unclassified', dot: 'bg-gray-300 dark:bg-gray-600' },
        ];
        // For sorting by utility column — puts highest-impact categories first.
        const UTILITY_ORDER = { useful: 4, trivial: 3, non_work: 2, harmful: 1, null: 0, undefined: 0 };

        // URL params let the analytics dashboard deep-link straight to filtered
        // views, e.g. /sessions/sam.garcia?utility=harmful&sort=value-asc.
        const urlParams = new URLSearchParams(location.search);

        let allSessions = [];
        let dateFilter = null;
        let utilityFilter = urlParams.get('utility') || 'all';
        let sortKey = urlParams.get('sort') || 'last_event_at-desc';
        let hourlyRate = 0;

        fetch(`/api/users/${encodeURIComponent(userId)}/heatmap`)
            .then(r => r.json())
            .then(days => renderActivityCalendar(days, document.getElementById('activity'), filterByDate));

        Promise.all([
            fetch(`/api/cost/user/${encodeURIComponent(userId)}`).then(r => r.ok ? r.json() : null).catch(() => null),
            fetch(`/api/users/${encodeURIComponent(userId)}/sessions`).then(r => r.json()),
            fetch(`/api/insights?user_id=${encodeURIComponent(userId)}`).then(r => r.ok ? r.json() : []).catch(() => []),
        ])
        .then(([costData, sessions, userInsights]) => {
            if (costData) {
                hourlyRate = costData.hourly_rate || 0;
                const eff = costData.efficiency_ratio;
                const effColor = eff === null ? 'text-gray-400' : eff >= 1 ? 'text-emerald-500' : 'text-amber-500';
                const effLabel = eff === null ? '—' : eff.toFixed(2) + 'x';
                const roi = costData.roi;
                const roiColor = roi === null ? 'text-gray-400' : roi >= 1 ? 'text-emerald-500' : 'text-amber-500';
                const roiLabel = roi === null ? '—' : roi.toFixed(1) + 'x';
                const plans = costData.plans.length ? costData.plans.join(', ') : '—';
                const rate = costData.hourly_rate !== null ? '$' + costData.hourly_rate.toFixed(0) + '/hr' : '—';
                document.getElementById('cost-cards').innerHTML = `<div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-6 gap-3 mb-6">
                    <div class="rounded-xl border border-gray-200 dark:border-gray-700/60 p-4 bg-white dark:bg-gray-900">
                        <div class="text-lg font-bold text-gray-900 dark:text-white">${esc(plans)}</div>
                        <div class="text-xs text-gray-400 mt-0.5">Plans</div>
                    </div>
                    <div class="rounded-xl border border-gray-200 dark:border-gray-700/60 p-4 bg-white dark:bg-gray-900">
                        <div class="text-2xl font-bold text-gray-900 dark:text-white">${rate}</div>
                        <div class="text-xs text-gray-400 mt-0.5">Hourly Rate</div>
                    </div>
                    <div class="rounded-xl border border-gray-200 dark:border-gray-700/60 p-4 bg-white dark:bg-gray-900">
                        <div class="text-2xl font-bold text-gray-900 dark:text-white">$${costData.monthly_subscription.toFixed(0)}</div>
                        <div class="text-xs text-gray-400 mt-0.5">Sub $/mo</div>
                    </div>
                    <div data-metric="value" class="rounded-xl border border-gray-200 dark:border-gray-700/60 p-4 bg-white dark:bg-gray-900">
                        <div class="text-2xl font-bold text-gray-900 dark:text-white">$${costData.estimated_value.toFixed(0)}</div>
                        <div class="text-xs text-gray-400 mt-0.5">Value / mo</div>
                    </div>
                    <div data-metric="efficiency" class="rounded-xl border border-gray-200 dark:border-gray-700/60 p-4 bg-white dark:bg-gray-900">
                        <div class="text-2xl font-bold ${effColor}">${effLabel}</div>
                        <div class="text-xs text-gray-400 mt-0.5">Cost Efficiency</div>
                    </div>
                    <div data-metric="roi" class="rounded-xl border border-gray-200 dark:border-gray-700/60 p-4 bg-white dark:bg-gray-900">
                        <div class="text-2xl font-bold ${roiColor}">${roiLabel}</div>
                        <div class="text-xs text-gray-400 mt-0.5">ROI</div>
                    </div>
                </div>`;
                attachMetricTooltips({
                    efficiency_ratio: costData.efficiency_ratio,
                    estimated_value: costData.estimated_value,
                    subscription: costData.monthly_subscription,
                    roi: costData.roi,
                });
            }
            // Render user insights inline
            if (userInsights.length) {
                const KIND_STYLES = {
                    cross_department_interest: { label: 'Cross-department', cls: 'bg-purple-100 text-purple-700 dark:bg-purple-900/30 dark:text-purple-300' },
                    above_paygrade: { label: 'Above paygrade', cls: 'bg-emerald-100 text-emerald-700 dark:bg-emerald-900/30 dark:text-emerald-300' },
                    below_paygrade: { label: 'Below paygrade', cls: 'bg-amber-100 text-amber-700 dark:bg-amber-900/30 dark:text-amber-300' },
                };
                let insHtml = '<div class="mb-6 space-y-2">';
                insHtml += '<h2 class="text-sm font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider mb-2">Insights</h2>';
                for (const ins of userInsights) {
                    const kind = KIND_STYLES[ins.kind] || KIND_STYLES.cross_department_interest;
                    insHtml += `<div class="rounded-lg border border-violet-200 dark:border-violet-800/40 bg-violet-50 dark:bg-violet-900/10 px-4 py-3">
                        <div class="flex items-center gap-2 mb-1">
                            <span class="px-1.5 py-0.5 rounded text-[0.65rem] font-semibold ${kind.cls}">${kind.label}</span>
                            <span class="text-xs text-gray-400">P${ins.priority}</span>
                        </div>
                        <p class="text-sm font-medium text-gray-900 dark:text-white mb-1">${esc(ins.title)}</p>
                        <p class="text-xs text-gray-600 dark:text-gray-400 leading-relaxed">${esc(ins.description)}</p>
                    </div>`;
                }
                insHtml += '</div>';
                document.getElementById('cost-cards').insertAdjacentHTML('afterend', insHtml);
            }

            allSessions = sessions;
            renderSessions();
        })
        .catch(e => {
            document.getElementById('content').innerHTML = '<p class="text-red-400 text-center py-8">Error: ' + e.message + '</p>';
        });

        function filterByDate(iso) {
            if (dateFilter === iso) { dateFilter = null; renderSessions(); return; }
            dateFilter = iso;
            renderSessions();
        }

        function setUtilityFilter(key) {
            utilityFilter = key;
            syncUrl();
            renderSessions();
        }

        function setSort(key) {
            // Clicking a header toggles direction; clicking a different header resets
            // to the convention that suits that column (desc for events/value/time,
            // asc for utility so harmful/non_work sort to the top when descending).
            const [curKey, curDir] = sortKey.split('-');
            if (curKey === key) {
                sortKey = `${key}-${curDir === 'asc' ? 'desc' : 'asc'}`;
            } else {
                // default direction: most-interesting-first for each column
                const defaults = {
                    last_event_at: 'desc',
                    event_count:   'desc',
                    value:         'desc',
                    utility:       'desc',   // useful first; flip to asc to see harmful first
                };
                sortKey = `${key}-${defaults[key] || 'desc'}`;
            }
            syncUrl();
            renderSessions();
        }

        function syncUrl() {
            const p = new URLSearchParams();
            if (utilityFilter !== 'all') p.set('utility', utilityFilter);
            if (sortKey !== 'last_event_at-desc') p.set('sort', sortKey);
            const q = p.toString();
            history.replaceState(null, '', location.pathname + (q ? '?' + q : ''));
        }

        function compareSessions(a, b, key) {
            if (key === 'event_count') return a.event_count - b.event_count;
            if (key === 'value') {
                return sessionValue(hourlyRate, a.event_count, a.utility)
                     - sessionValue(hourlyRate, b.event_count, b.utility);
            }
            if (key === 'utility') {
                return (UTILITY_ORDER[a.utility] ?? 0) - (UTILITY_ORDER[b.utility] ?? 0);
            }
            // default: last_event_at (iso strings compare correctly lexically)
            return a.last_event_at.localeCompare(b.last_event_at);
        }

        function applyFiltersAndSort(sessions) {
            let out = sessions;
            if (dateFilter) {
                out = out.filter(s => s.last_event_at.slice(0, 10) === dateFilter);
            }
            if (utilityFilter !== 'all') {
                out = out.filter(s => (s.utility || 'unclassified') === utilityFilter);
            }
            const [key, dir] = sortKey.split('-');
            out = [...out].sort((a, b) => compareSessions(a, b, key));
            if (dir === 'desc') out.reverse();
            return out;
        }

        function utilityFilterBar() {
            const counts = { all: allSessions.length };
            for (const s of allSessions) {
                const k = s.utility || 'unclassified';
                counts[k] = (counts[k] || 0) + 1;
            }
            return '<div class="flex flex-wrap gap-1.5 mb-3">'
                + UTILITY_FILTERS.map(f => {
                    const n = counts[f.key] || 0;
                    if (f.key !== 'all' && n === 0) return '';  // hide empty buckets
                    const active = utilityFilter === f.key;
                    const bg = active
                        ? 'bg-blue-600 text-white border-blue-600'
                        : 'bg-white dark:bg-gray-900 text-gray-600 dark:text-gray-300 border-gray-200 dark:border-gray-700 hover:border-gray-400 dark:hover:border-gray-500';
                    const dot = f.dot ? `<span class="inline-block w-2 h-2 rounded-full ${f.dot} mr-1.5"></span>` : '';
                    return `<button onclick="setUtilityFilter('${f.key}')" class="inline-flex items-center px-2.5 py-1 rounded-full text-xs font-medium border transition-colors ${bg}">${dot}${esc(f.label)}<span class="ml-1.5 text-[0.65rem] ${active ? 'text-white/80' : 'text-gray-400'}">${n}</span></button>`;
                }).join('')
                + '</div>';
        }

        function sortArrow(forKey) {
            const [key, dir] = sortKey.split('-');
            if (key !== forKey) return '<span class="text-gray-300 dark:text-gray-600 ml-1">↕</span>';
            return dir === 'asc'
                ? '<span class="text-blue-500 ml-1">↑</span>'
                : '<span class="text-blue-500 ml-1">↓</span>';
        }

        function sortableTh(forKey, label, align) {
            const a = align || 'left';
            return `<th class="text-${a} px-4 py-2.5 font-medium text-gray-500 dark:text-gray-400 cursor-pointer select-none hover:text-gray-800 dark:hover:text-gray-200" onclick="setSort('${forKey}')">${esc(label)}${sortArrow(forKey)}</th>`;
        }

        function renderSessions() {
            const el = document.getElementById('content');
            const sessions = applyFiltersAndSort(allSessions);

            let notes = [];
            if (dateFilter) {
                notes.push(`Date: <strong>${dateFilter}</strong> <button onclick="filterByDate('${dateFilter}')" class="text-blue-500 hover:underline ml-1">clear</button>`);
            }
            // Sum of value for the current filtered set — shows the impact of the slice
            const filteredValue = sessions.reduce((s, x) => s + sessionValue(hourlyRate, x.event_count, x.utility), 0);
            const fvColor = filteredValue < 0 ? 'text-red-500' : filteredValue > 0 ? 'text-emerald-600 dark:text-emerald-400' : 'text-gray-400';
            const fvLabel = filteredValue < 0 ? '−$' + Math.round(-filteredValue) : '$' + Math.round(filteredValue);
            const impactLine = utilityFilter !== 'all' || dateFilter
                ? `<p class="text-xs text-gray-500 dark:text-gray-400 mb-2">${sessions.length} session${sessions.length === 1 ? '' : 's'} · combined value <span class="font-semibold ${fvColor}">${fvLabel}</span></p>`
                : '';

            let html = utilityFilterBar() + impactLine;
            if (notes.length) html += `<p class="text-sm text-gray-500 dark:text-gray-400 mb-3">${notes.join(' · ')}</p>`;

            if (!sessions.length) {
                let emptyMsg = 'No sessions.';
                if (dateFilter) emptyMsg = 'No sessions on this date.';
                else if (utilityFilter !== 'all') emptyMsg = `No ${utilityFilter.replace('_', '-')} sessions.`;
                el.innerHTML = html + '<p class="text-gray-400 text-center py-8">' + emptyMsg + '</p>';
                return;
            }
            html += `<div class="rounded-xl border border-gray-200 dark:border-gray-700/60 overflow-hidden">
                <div class="overflow-x-auto">
                <table class="w-full text-sm">
                <thead><tr class="bg-gray-100 dark:bg-gray-800/60">
                    <th class="text-left px-4 py-2.5 font-medium text-gray-500 dark:text-gray-400">Session</th>
                    <th class="text-left px-4 py-2.5 font-medium text-gray-500 dark:text-gray-400">Provider</th>
                    <th class="text-left px-4 py-2.5 font-medium text-gray-500 dark:text-gray-400">Platform</th>
                    ${sortableTh('event_count', 'Events', 'center')}
                    ${sortableTh('utility', 'Utility', 'left')}
                    ${sortableTh('value', 'Value', 'right')}
                    <th class="text-left px-4 py-2.5 font-medium text-gray-500 dark:text-gray-400">Last Event</th>
                    ${sortableTh('last_event_at', 'Last Active', 'left')}
                </tr></thead><tbody class="divide-y divide-gray-100 dark:divide-gray-800">`;
            for (const s of sessions) {
                const t = new Date(s.last_event_at).toLocaleString();
                const badgeCls = s.last_event_type === 'error'
                    ? 'bg-red-100 text-red-700 dark:bg-red-900/40 dark:text-red-300'
                    : s.last_event_type === 'ai_message'
                    ? 'bg-emerald-100 text-emerald-700 dark:bg-emerald-900/40 dark:text-emerald-300'
                    : 'bg-blue-100 text-blue-700 dark:bg-blue-900/40 dark:text-blue-300';
                const badge = s.last_event_type ? `<span class="text-xs px-1.5 py-0.5 rounded font-medium ${badgeCls}">${s.last_event_type}</span>` : '';
                const shortId = s.session_id.length > 16 ? s.session_id.slice(0, 16) + '...' : s.session_id;
                const val = sessionValue(hourlyRate, s.event_count, s.utility);
                let valLabel, valCls, valTitle = '';
                if (val > 0) {
                    valLabel = '$' + val.toFixed(0);
                    valCls = 'text-gray-600 dark:text-gray-400';
                    const hrs = Math.log2(Math.max(s.event_count, 1)) * (UTILITY_HOURS[s.utility] || 0);
                    valTitle = `${hrs.toFixed(1)}hr saved × $${hourlyRate.toFixed(0)}/hr × 0.5 displacement = $${val.toFixed(0)}`;
                } else if (val < 0) {
                    valLabel = '−$' + Math.abs(val).toFixed(0);
                    valCls = 'text-red-500';
                    const hrs = Math.log2(Math.max(s.event_count, 1)) * (UTILITY_HOURS[s.utility] || 0);
                    valTitle = `${hrs.toFixed(1)}hr cost × $${hourlyRate.toFixed(0)}/hr = -$${Math.abs(val).toFixed(0)} (no displacement on harmful)`;
                } else {
                    valLabel = '—';
                    valCls = 'text-gray-400';
                }
                html += `<tr class="hover:bg-gray-50 dark:hover:bg-gray-800/40 transition-colors">
                    <td class="px-4 py-2.5"><a href="/session/${encodeURIComponent(userId)}/${encodeURIComponent(s.session_id)}" class="text-blue-600 dark:text-blue-400 hover:underline font-mono text-xs" title="${esc(s.session_id)}">${esc(shortId)}</a></td>
                    <td class="px-4 py-2.5">${providerBadge(s.provider)}</td>
                    <td class="px-4 py-2.5">${platformBadge(s.platform)}</td>
                    <td class="px-4 py-2.5 text-center text-gray-600 dark:text-gray-400">${s.event_count}</td>
                    <td class="px-4 py-2.5">${utilityBadge(s.utility)}</td>
                    <td class="px-4 py-2.5 text-right ${valCls} tabular-nums" title="${valTitle}">${valLabel}</td>
                    <td class="px-4 py-2.5">${badge}</td>
                    <td class="px-4 py-2.5 text-gray-500 dark:text-gray-400 text-xs">${t}</td>
                </tr>`;
            }
            html += '</tbody></table></div></div>';
            el.innerHTML = html;
        }

        function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

        // Render company badge once nav data is ready
        (function waitBadge() {
            if (!window.seerai || !window.seerai.ready) { setTimeout(waitBadge, 50); return; }
            window.seerai.ready.then(function () {
                const company = window.seerai.getUserCompany(userId);
                if (company) {
                    document.getElementById('company-badge').innerHTML =
                        window.seerai.companyBadge(company, { showName: false })
                        + '<span class="mx-1">/</span>';
                }
            });
        })();
    </script>
</body>
</html>

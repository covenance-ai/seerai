<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>seerai — cost &amp; ROI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
    <script>if (localStorage.getItem('seerai_theme') === 'dark' || (!localStorage.getItem('seerai_theme') && matchMedia('(prefers-color-scheme:dark)').matches)) document.documentElement.classList.add('dark');</script>
    <script src="/static/icons.js"></script>
    <script src="/static/tooltips.js"></script>
    <script src="/static/nav.js" defer></script>
</head>
<body class="bg-gray-50 dark:bg-gray-950 text-gray-800 dark:text-gray-200 min-h-screen">
    <div class="max-w-5xl mx-auto px-4 py-8">
        <p class="text-sm text-gray-500 dark:text-gray-400 mb-1">
            <a href="/" class="text-blue-600 dark:text-blue-400 hover:underline">seerai</a>
            <span class="mx-1">/</span>
            <span class="text-gray-700 dark:text-gray-300">cost &amp; ROI</span>
        </p>
        <h1 class="text-2xl font-bold text-gray-900 dark:text-white mb-2">Subscription Cost & ROI</h1>
        <p class="text-sm text-gray-500 dark:text-gray-400 mb-6">Cost efficiency and estimated return on AI subscription investment. All cost &amp; value figures are over the trailing 30 days, to match the monthly subscription billing period.</p>
        <div id="content"><p class="text-gray-400 text-center py-8">Loading...</p></div>
    </div>
    <script>
        const user = JSON.parse(localStorage.getItem('seerai_user') || 'null');
        if (!user) {
            document.getElementById('content').innerHTML = '<p class="text-gray-400 text-center py-8">Select a user to view cost data.</p>';
        } else if (user.role === 'admin') {
            // Admin: show costs for all root orgs
            fetch('/api/orgs')
                .then(r => r.json())
                .then(roots => Promise.all(roots.map(r =>
                    fetch('/api/cost/org/' + encodeURIComponent(r.org_id))
                        .then(resp => resp.ok ? resp.json() : null)
                        .then(data => ({ org: r, data: data }))
                )))
                .then(results => {
                    let combined = document.getElementById('content');
                    combined.innerHTML = '';
                    for (const { org, data } of results) {
                        if (!data) continue;
                        const badge = (window.seerai && window.seerai.companyBadge)
                            ? window.seerai.companyBadge(org.org_id, { size: 'lg' })
                            : '<span class="font-medium">' + esc(org.name) + '</span>';
                        const section = document.createElement('div');
                        section.className = 'mb-10';
                        section.innerHTML = '<div class="flex items-center gap-3 mb-4">' + badge + '</div><div class="cost-section"></div>';
                        combined.appendChild(section);
                        renderInto(section.querySelector('.cost-section'), data);
                    }
                })
                .catch(e => {
                    document.getElementById('content').innerHTML = '<p class="text-red-400 text-center py-8">Error: ' + esc(e.message) + '</p>';
                });
        } else if (user.org_id) {
            fetch('/api/orgs/' + encodeURIComponent(user.org_id))
                .then(r => r.json())
                .then(org => {
                    const rootId = org.path[0];
                    return fetch('/api/cost/org/' + encodeURIComponent(rootId));
                })
                .then(r => { if (!r.ok) throw new Error('' + r.status); return r.json(); })
                .then(data => render(data))
                .catch(e => {
                    document.getElementById('content').innerHTML = '<p class="text-red-400 text-center py-8">Error: ' + esc(e.message) + '</p>';
                });
        } else {
            document.getElementById('content').innerHTML = '<p class="text-gray-400 text-center py-8">No organization assigned.</p>';
        }

        function render(data) { renderInto(document.getElementById('content'), data); }
        function renderInto(container, data) {
            const effRatio = data.efficiency_ratio;
            const effColor = effRatio === null ? 'text-gray-400' : effRatio >= 1 ? 'text-emerald-500' : 'text-amber-500';
            const effLabel = effRatio === null ? '—' : effRatio.toFixed(2) + 'x';

            const roi = data.roi;
            const roiColor = roi === null ? 'text-gray-400' : roi >= 1 ? 'text-emerald-500' : 'text-amber-500';
            const roiLabel = roi === null ? '—' : roi.toFixed(1) + 'x';

            const ub = data.utility_breakdown;
            const totalSessions = ub.non_work + ub.trivial + ub.useful + (ub.harmful || 0) + ub.unclassified;
            const pct = (n) => totalSessions > 0 ? Math.round(n / totalSessions * 100) : 0;

            let html = `
            <!-- Summary cards -->
            <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-6 gap-3 mb-6">
                <div class="rounded-xl border border-gray-200 dark:border-gray-700/60 p-4 bg-white dark:bg-gray-900">
                    <div class="text-2xl font-bold text-gray-900 dark:text-white">$${data.total_monthly_subscription.toFixed(0)}</div>
                    <div class="text-xs text-gray-400 mt-0.5">Subscriptions / mo</div>
                </div>
                <div class="rounded-xl border border-gray-200 dark:border-gray-700/60 p-4 bg-white dark:bg-gray-900">
                    <div class="text-2xl font-bold text-gray-900 dark:text-white">$${data.total_api_equivalent.toFixed(2)}</div>
                    <div class="text-xs text-gray-400 mt-0.5">API equiv. / mo</div>
                </div>
                <div data-metric="efficiency" class="rounded-xl border border-gray-200 dark:border-gray-700/60 p-4 bg-white dark:bg-gray-900">
                    <div class="text-2xl font-bold ${effColor}">${effLabel}</div>
                    <div class="text-xs text-gray-400 mt-0.5">Cost Efficiency</div>
                </div>
                <div data-metric="value" class="rounded-xl border border-gray-200 dark:border-gray-700/60 p-4 bg-white dark:bg-gray-900">
                    <div class="text-2xl font-bold text-gray-900 dark:text-white">$${data.total_estimated_value.toFixed(0)}</div>
                    <div class="text-xs text-gray-400 mt-0.5">Value / mo</div>
                </div>
                <div data-metric="roi" class="rounded-xl border border-gray-200 dark:border-gray-700/60 p-4 bg-white dark:bg-gray-900">
                    <div class="text-2xl font-bold ${roiColor}">${roiLabel}</div>
                    <div class="text-xs text-gray-400 mt-0.5">ROI</div>
                </div>
                <div class="rounded-xl border border-gray-200 dark:border-gray-700/60 p-4 bg-white dark:bg-gray-900">
                    <div class="text-2xl font-bold text-gray-900 dark:text-white">${data.users.filter(u => u.plans.length > 0).length}<span class="text-base font-normal text-gray-400"> / ${data.user_count}</span></div>
                    <div class="text-xs text-gray-400 mt-0.5">Subscribed / Total</div>
                </div>
            </div>

            <!-- Session utility breakdown bar -->
            <div class="rounded-xl border border-gray-200 dark:border-gray-700/60 p-4 bg-white dark:bg-gray-900 mb-6">
                <div class="text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider mb-2">Session Classification (${totalSessions} sessions)</div>
                <div class="flex h-4 rounded-full overflow-hidden bg-gray-200 dark:bg-gray-700 mb-2">
                    ${ub.useful > 0 ? `<div class="bg-emerald-500" style="width:${pct(ub.useful)}%" title="Useful: ${ub.useful}"></div>` : ''}
                    ${ub.trivial > 0 ? `<div class="bg-blue-400" style="width:${pct(ub.trivial)}%" title="Trivial: ${ub.trivial}"></div>` : ''}
                    ${ub.non_work > 0 ? `<div class="bg-gray-400" style="width:${pct(ub.non_work)}%" title="Non-work: ${ub.non_work}"></div>` : ''}
                    ${(ub.harmful || 0) > 0 ? `<div class="bg-red-500" style="width:${pct(ub.harmful)}%" title="Harmful (QA-flagged): ${ub.harmful}"></div>` : ''}
                    ${ub.unclassified > 0 ? `<div class="bg-gray-300 dark:bg-gray-600" style="width:${pct(ub.unclassified)}%" title="Unclassified: ${ub.unclassified}"></div>` : ''}
                </div>
                <div class="flex gap-4 text-xs text-gray-500 dark:text-gray-400 flex-wrap">
                    <span><span class="inline-block w-2 h-2 rounded-full bg-emerald-500 mr-1"></span>Useful ${ub.useful} (${pct(ub.useful)}%)</span>
                    <span><span class="inline-block w-2 h-2 rounded-full bg-blue-400 mr-1"></span>Trivial ${ub.trivial} (${pct(ub.trivial)}%)</span>
                    <span><span class="inline-block w-2 h-2 rounded-full bg-gray-400 mr-1"></span>Non-work ${ub.non_work} (${pct(ub.non_work)}%)</span>
                    ${(ub.harmful || 0) > 0 ? `<span title="Flagged by post-hoc QA review (stronger model + user feedback) as net-negative"><span class="inline-block w-2 h-2 rounded-full bg-red-500 mr-1"></span>Harmful ${ub.harmful} (${pct(ub.harmful)}%)</span>` : ''}
                    ${ub.unclassified > 0 ? `<span><span class="inline-block w-2 h-2 rounded-full bg-gray-300 dark:bg-gray-600 mr-1"></span>Unclassified ${ub.unclassified}</span>` : ''}
                </div>
            </div>`;

            // Per-user table
            if (data.users.length) {
                html += `<h2 class="text-sm font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider mb-3">Per-User Breakdown</h2>`;
                html += `<div class="rounded-xl border border-gray-200 dark:border-gray-700/60 overflow-hidden mb-6">
                    <div class="overflow-x-auto">
                    <table class="w-full text-sm">
                    <thead><tr class="bg-gray-100 dark:bg-gray-800/60">
                        <th class="text-left px-4 py-2.5 font-medium text-gray-500 dark:text-gray-400">User</th>
                        <th class="text-left px-4 py-2.5 font-medium text-gray-500 dark:text-gray-400">Plans</th>
                        <th class="text-right px-4 py-2.5 font-medium text-gray-500 dark:text-gray-400">$/hr</th>
                        <th class="text-right px-4 py-2.5 font-medium text-gray-500 dark:text-gray-400">Sub $/mo</th>
                        <th class="text-right px-4 py-2.5 font-medium text-gray-500 dark:text-gray-400">Value / mo</th>
                        <th class="text-right px-4 py-2.5 font-medium text-gray-500 dark:text-gray-400">ROI</th>
                        <th class="text-center px-4 py-2.5 font-medium text-gray-500 dark:text-gray-400">Sessions</th>
                        <th class="text-left px-4 py-2.5 font-medium text-gray-500 dark:text-gray-400">Utility</th>
                    </tr></thead><tbody class="divide-y divide-gray-100 dark:divide-gray-800">`;

                for (const u of data.users) {
                    const ur = u.roi;
                    const uColor = ur === null ? 'text-gray-400' : ur >= 1 ? 'text-emerald-500' : 'text-amber-500';
                    const uLabel = ur === null ? '—' : ur.toFixed(1) + 'x';
                    const planIcons = u.plans.length ? u.plans.map(p => {
                        const prov = p.toLowerCase().includes('claude') ? 'anthropic'
                            : p.toLowerCase().includes('chatgpt') ? 'openai'
                            : p.toLowerCase().includes('gemini') ? 'google' : null;
                        return `<span class="inline-flex items-center gap-1" title="${esc(p)}">${providerIcon(prov)}<span class="text-xs text-gray-500 dark:text-gray-400">${esc(p)}</span></span>`;
                    }).join(' ') : '<span class="text-gray-400">—</span>';
                    const rate = u.hourly_rate !== null ? '$' + u.hourly_rate.toFixed(0) : '—';
                    const uu = u.utility_breakdown;
                    const utilBar = miniBar(uu);

                    html += `<tr class="hover:bg-gray-50 dark:hover:bg-gray-800/40 transition-colors">
                        <td class="px-4 py-2.5">
                            <a href="/sessions/${encodeURIComponent(u.user_id)}" class="text-blue-600 dark:text-blue-400 hover:underline">${esc(u.user_id)}</a>
                        </td>
                        <td class="px-4 py-2.5">${planIcons}</td>
                        <td class="px-4 py-2.5 text-right text-gray-600 dark:text-gray-400">${rate}</td>
                        <td class="px-4 py-2.5 text-right text-gray-600 dark:text-gray-400">$${u.monthly_subscription.toFixed(0)}</td>
                        <td class="px-4 py-2.5 text-right text-gray-600 dark:text-gray-400">$${u.estimated_value.toFixed(0)}</td>
                        <td class="px-4 py-2.5 text-right font-medium ${uColor}">${uLabel}</td>
                        <td class="px-4 py-2.5 text-center text-gray-600 dark:text-gray-400">${u.session_count}</td>
                        <td class="px-4 py-2.5">${utilBar}</td>
                    </tr>`;
                }

                html += '</tbody></table></div></div>';
            }

            // Explanation section
            html += `
            <details class="rounded-xl border border-gray-200 dark:border-gray-700/60 bg-white dark:bg-gray-900 overflow-hidden">
                <summary class="px-4 py-3 cursor-pointer text-sm font-medium text-gray-700 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-800/40">
                    How these metrics are computed
                </summary>
                <div class="px-4 pb-4 text-sm text-gray-600 dark:text-gray-400 space-y-3 border-t border-gray-100 dark:border-gray-800 pt-3">
                    <div>
                        <span class="font-medium text-gray-800 dark:text-gray-200">Cost Efficiency</span> =
                        API-equivalent cost (last 30d) &div; subscription cost (per month).<br>
                        API cost is computed from actual token usage at each model's per-token API price (output tokens only &mdash; conservative lower bound).
                        A ratio above 1.0 means the subscription is cheaper than pay-per-use API; below 1.0 means API would save money.
                    </div>
                    <div>
                        <span class="font-medium text-gray-800 dark:text-gray-200">Estimated Value</span> per session =
                        <code class="bg-gray-100 dark:bg-gray-800 px-1 rounded text-xs">hourly_rate &times; log<sub>2</sub>(events) &times; hours_factor &times; displacement</code><br>
                        <span class="font-medium">hourly_rate</span>: employee paygrade ($/hr), proxy for the cost of their time.<br>
                        <span class="font-medium">hours_factor</span>: estimated time impact per unit of log<sub>2</sub>(events) &mdash;
                        <span class="text-gray-400">non-work = 0</span>,
                        <span class="text-blue-500">trivial = 0.05</span>,
                        <span class="text-emerald-500">useful = 0.25</span>,
                        <span class="text-red-500">harmful = &minus;0.30</span>.<br>
                        <span class="font-medium">displacement</span> = 0.5 on positive contributions only (saved time isn't 1:1 fungible with paid hourly rate &mdash; counterfactual uncertainty, context-switch overhead). Negative contributions from harmful sessions are <em>not</em> discounted: cleanup time after a hallucination is real wall-clock time spent recovering.<br>
                        Example: a useful 64-message session at $100/hr &asymp; $75 net positive; a harmful 16-message session at $100/hr &asymp; <span class="text-red-500">&minus;$120</span> (1+ hour spent recovering from a wrong-direction debugging spiral).
                    </div>
                    <div>
                        <span class="font-medium text-gray-800 dark:text-gray-200">Harmful</span> sessions: not assigned at ingest time. The cheap classifier only emits useful / trivial / non-work. Periodically, a stronger model and accumulated user feedback (thumbs-down, manual flags) re-review a sample of sessions and override the original verdict &mdash; sessions where AI hallucinated, sent the user down the wrong path, or produced confidently-wrong code that had to be reverted get re-tagged as harmful. The QA review timestamp and reason are stored alongside the session.
                    </div>
                    <div>
                        <span class="font-medium text-gray-800 dark:text-gray-200">ROI</span> =
                        estimated value (last 30d) &div; subscription cost (per month).<br>
                        Above 1.0 means the company is getting more value than it spends. This is a directional metric &mdash; the absolute numbers are proxies, but relative comparisons across users and departments are meaningful.
                    </div>
                </div>
            </details>`;

            container.innerHTML = html;
            attachMetricTooltips({
                efficiency_ratio: data.efficiency_ratio,
                estimated_value: data.total_estimated_value,
                subscription: data.total_monthly_subscription,
                roi: data.roi,
            }, container);
        }

        function miniBar(ub) {
            const harmful = ub.harmful || 0;
            const total = ub.non_work + ub.trivial + ub.useful + harmful + (ub.unclassified || 0);
            if (total === 0) return '<span class="text-gray-400 text-xs">—</span>';
            const w = (n) => Math.round(n / total * 100);
            const title = ub.useful + ' useful, ' + ub.trivial + ' trivial, ' + ub.non_work + ' non-work' +
                (harmful ? ', ' + harmful + ' harmful (QA-flagged)' : '');
            let bar = '<div class="flex h-2 w-20 rounded-full overflow-hidden bg-gray-200 dark:bg-gray-700" title="' + title + '">';
            if (ub.useful) bar += `<div class="bg-emerald-500" style="width:${w(ub.useful)}%"></div>`;
            if (ub.trivial) bar += `<div class="bg-blue-400" style="width:${w(ub.trivial)}%"></div>`;
            if (ub.non_work) bar += `<div class="bg-gray-400" style="width:${w(ub.non_work)}%"></div>`;
            if (harmful) bar += `<div class="bg-red-500" style="width:${w(harmful)}%"></div>`;
            bar += '</div>';
            return bar;
        }

        function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
    </script>
</body>
</html>

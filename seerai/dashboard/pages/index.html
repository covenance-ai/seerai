<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>seerai</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
    <script>/* prevent FOUC */ if (localStorage.getItem('seerai_theme') === 'dark' || (!localStorage.getItem('seerai_theme') && matchMedia('(prefers-color-scheme:dark)').matches)) document.documentElement.classList.add('dark');</script>
    <script src="/static/nav.js" defer></script>
</head>
<body class="bg-gray-50 dark:bg-gray-950 text-gray-800 dark:text-gray-200 min-h-screen">
    <div class="max-w-4xl mx-auto px-4 py-8">
        <h1 class="text-2xl font-bold text-gray-900 dark:text-white mb-1">Users</h1>
        <p class="text-gray-500 dark:text-gray-400 mb-6">All observed LLM chat users</p>
        <div id="content"><p class="text-gray-400 text-center py-8">Loading...</p></div>
    </div>
    <script>
        fetch('/api/users')
            .then(r => r.json())
            .then(users => {
                const el = document.getElementById('content');
                if (!users.length) {
                    el.innerHTML = '<p class="text-gray-400 text-center py-8">No users yet. POST events to /api/ingest to get started.</p>';
                    return;
                }
                let html = `<div class="rounded-xl border border-gray-200 dark:border-gray-700/60 overflow-hidden">
                    <table class="w-full text-sm">
                    <thead><tr class="bg-gray-100 dark:bg-gray-800/60">
                        <th class="text-left px-4 py-2.5 font-medium text-gray-500 dark:text-gray-400">User</th>
                        <th class="text-left px-4 py-2.5 font-medium text-gray-500 dark:text-gray-400">Last Active</th>
                    </tr></thead><tbody class="divide-y divide-gray-100 dark:divide-gray-800">`;
                for (const u of users) {
                    const t = new Date(u.last_active).toLocaleString();
                    html += `<tr class="hover:bg-gray-50 dark:hover:bg-gray-800/40 transition-colors">
                        <td class="px-4 py-2.5"><a href="/sessions/${encodeURIComponent(u.user_id)}" class="text-blue-600 dark:text-blue-400 hover:underline">${esc(u.user_id)}</a></td>
                        <td class="px-4 py-2.5 text-gray-500 dark:text-gray-400">${t}</td>
                    </tr>`;
                }
                html += '</tbody></table></div>';
                el.innerHTML = html;
            })
            .catch(e => {
                document.getElementById('content').innerHTML = '<p class="text-red-400 text-center py-8">Error loading users: ' + e.message + '</p>';
            });

        function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
    </script>
</body>
</html>

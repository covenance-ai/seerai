<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>seerai — dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
    <script>if (localStorage.getItem('seerai_theme') === 'dark' || (!localStorage.getItem('seerai_theme') && matchMedia('(prefers-color-scheme:dark)').matches)) document.documentElement.classList.add('dark');</script>
    <script src="/static/nav.js" defer></script>
</head>
<body class="bg-gray-50 dark:bg-gray-950 text-gray-800 dark:text-gray-200 min-h-screen">
    <div class="max-w-4xl mx-auto px-4 py-8">
        <div id="content"><p class="text-gray-400 text-center py-8">Loading...</p></div>
    </div>
    <script>
        // Redirect to the current user's root org
        const user = (() => { try { return JSON.parse(localStorage.getItem('seerai_user')); } catch { return null; } })();
        if (!user || !user.org_id) {
            document.getElementById('content').innerHTML = '<p class="text-gray-400 text-center py-8">Select a user first to view their organization dashboard.</p>';
        } else {
            fetch(`/api/orgs/${encodeURIComponent(user.org_id)}`)
                .then(r => { if (!r.ok) throw new Error('Org not found'); return r.json(); })
                .then(org => {
                    const rootOrgId = org.path[0];
                    window.location.replace(`/exec/${encodeURIComponent(rootOrgId)}`);
                })
                .catch(e => {
                    document.getElementById('content').innerHTML = '<p class="text-red-400 text-center py-8">Error: ' + e.message + '</p>';
                });
        }
    </script>
</body>
</html>
